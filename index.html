<!DOCTYPE html>
<!-- v21 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="記録">
<title>記録</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1e2420;
  --bg2:     #252d28;
  --card:    #2b342e;
  --card2:   #323d36;
  --border:  #3d4d42;
  --border2: #4e6054;

  --chalk:   #e8f0e9;
  --chalk2:  #b0c4b4;
  --chalk3:  #6e8872;
  --chalk4:  #3e5442;

  --accent:  #d4b896;
  --accent2: #c4a070;
  --accent3: #f0d0a8;

  --red-s:   #c87060;
  --green-s: #70a880;
  --blue-s:  #7090b8;

  --font:    'Zen Maru Gothic', sans-serif;
  --mono:    'DM Mono', monospace;
  --r:       18px;
  --r2:      14px;
  --r3:      28px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--chalk); font-family:var(--font); font-weight:400; }

/* Chalkboard texture */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.06;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,.04) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,.02) 4px);
}
/* body::after のノイズオーバーレイは削除（iOSでpointer-events:noneが効かずタップを全て妨げるため） */

.app { position:relative; z-index:1; display:flex; flex-direction:column; height:100dvh; }

/* ── TOPBAR ── */
.topbar {
  flex-shrink:0; padding:14px 18px 12px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.topbar-title { font-size:20px; font-weight:700; color:var(--accent3); letter-spacing:.08em; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.topbar-date { font-family:var(--mono); font-size:10px; color:var(--chalk3); }
.backup-btn {
  padding:6px 14px; background:transparent; border:1px solid var(--border2);
  color:var(--chalk3); font-size:10px; cursor:pointer; letter-spacing:.06em;
  font-family:var(--font); font-weight:500; border-radius:20px; transition:all .2s;
}
.backup-btn:hover { color:var(--accent3); border-color:var(--accent2); }

/* ── NAV ── */
.nav {
  flex-shrink:0; display:flex; background:var(--bg2);
  border-bottom:2px solid var(--border); overflow-x:auto;
  scrollbar-width:none; padding:0 10px; gap:4px;
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  flex:0 0 auto; padding:11px 20px; background:none; border:none; cursor:pointer;
  font-family:var(--font); font-size:12px; font-weight:500; letter-spacing:.06em;
  color:var(--chalk3); border-bottom:3px solid transparent; transition:all .2s;
  white-space:nowrap; margin-bottom:-2px;
}
.nav-btn.active { color:var(--accent3); border-bottom-color:var(--accent2); }

/* ── CONTENT ── */
.content { flex:1; overflow-y:auto; padding:16px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

/* ══ INPUT PANEL ══ */
.input-panel {
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--r3); padding:20px; margin-bottom:16px;
}
.panel-eyebrow {
  font-size:10px; color:var(--chalk3); letter-spacing:.14em; text-transform:uppercase;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.panel-eyebrow::before { content:''; display:block; width:20px; height:1px; background:var(--chalk3); }

/* Big mic */
.big-mic {
  width:100%; padding:24px 18px;
  background:var(--card2); border:2px solid var(--border2);
  border-radius:var(--r); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  transition:all .25s; font-family:var(--font); position:relative; overflow:hidden;
}
.big-mic:hover { border-color:var(--accent2); background:var(--bg2); }
.big-mic.rec { border-color:var(--red-s); background:var(--bg2); animation:rec-pulse 1.6s ease-in-out infinite; }
@keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(200,112,96,.0)} 50%{box-shadow:0 0 0 12px rgba(200,112,96,.12)} }
.mic-orb {
  width:64px; height:64px; border-radius:50%;
  background:var(--bg2); border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; transition:all .25s;
}
.big-mic:hover .mic-orb { border-color:var(--accent2); }
.big-mic.rec .mic-orb { border-color:var(--red-s); animation:orb-beat .9s ease-in-out infinite; }
@keyframes orb-beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.mic-main { font-size:16px; font-weight:700; color:var(--chalk); letter-spacing:.1em; }
.mic-sub { font-size:11px; color:var(--chalk3); text-align:center; line-height:1.7; max-width:300px; }

/* Photo slots */
.photo-row { display:flex; gap:8px; margin-top:12px; }
.photo-slot {
  flex:1; background:var(--bg2); border:1px dashed var(--border2);
  border-radius:var(--r2); padding:12px 6px; text-align:center;
  cursor:pointer; position:relative; transition:all .2s;
  min-height:72px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
}
.photo-slot:hover { border-color:var(--accent2); }
.photo-slot.has { border-style:solid; border-color:var(--green-s); }
.photo-slot input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
.ps-icon { font-size:20px; }
.ps-lbl { font-size:9px; color:var(--chalk3); letter-spacing:.04em; }
.photo-slot img { max-width:100%; max-height:52px; object-fit:cover; border-radius:8px; display:none; }
.ps-rm {
  position:absolute; top:4px; right:4px; background:var(--card2);
  border:1px solid var(--border2); color:var(--chalk3); width:18px; height:18px;
  border-radius:50%; cursor:pointer; font-size:9px; display:none;
  align-items:center; justify-content:center; z-index:2; font-family:var(--font);
}
.photo-slot.has .ps-rm { display:flex; }

/* Transcript */
.ta-wrap { margin-top:12px; display:block; }
.ta-wrap.hide { display:none; }
.ta {
  width:100%; min-height:64px; background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--r2); color:var(--chalk); font-family:var(--font);
  font-size:13px; line-height:1.9; padding:11px 14px; resize:none; outline:none;
  font-weight:400;
}
.ta::placeholder { color:var(--chalk4); }
.ta:focus { border-color:var(--accent2); }
.action-row { display:flex; gap:8px; margin-top:10px; }
.submit-btn {
  flex:1; padding:14px;
  background:var(--accent2); color:var(--bg);
  border:none; border-radius:var(--r2); cursor:pointer;
  font-family:var(--font); font-size:13px; font-weight:700;
  letter-spacing:.1em; transition:all .2s;
}
.submit-btn:hover { background:var(--accent3); }
.submit-btn:disabled { opacity:.4; cursor:default; }
.clr-btn {
  padding:14px 16px; background:transparent; border:1px solid var(--border2);
  color:var(--chalk3); cursor:pointer; border-radius:var(--r2);
  font-size:12px; font-family:var(--font); transition:all .15s;
}
.clr-btn:hover { border-color:var(--chalk3); color:var(--chalk); }

/* ── LIVE RESULTS ── */
.live-panel {
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--r3); overflow:hidden; margin-bottom:16px;
}
.live-head {
  padding:12px 18px; background:var(--card2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.live-head-title { font-size:11px; font-weight:700; color:var(--accent3); letter-spacing:.12em; }
.live-head-clr { background:none; border:none; color:var(--chalk3); cursor:pointer; font-size:10px; font-family:var(--font); }
.live-body { padding:14px 18px; }

.result-entry {
  display:flex; align-items:flex-start; gap:10px; padding:9px 12px;
  background:var(--bg2); border-radius:var(--r2); margin-bottom:7px;
}
.result-entry:last-child { margin-bottom:0; }
.cat-pill {
  flex-shrink:0; font-size:9px; font-weight:700; padding:3px 10px;
  border-radius:20px; white-space:nowrap; margin-top:2px; letter-spacing:.04em;
}
.cp-sleep  { background:rgba(112,144,184,.2); color:#a0c0e8; }
.cp-meal   { background:rgba(212,184,150,.2); color:var(--accent3); }
.cp-skin   { background:rgba(200,112,96,.2);  color:#e8a098; }
.cp-body   { background:rgba(112,168,128,.2); color:#90c8a0; }
.cp-finance{ background:rgba(184,160,96,.2);  color:#e0c880; }
.cp-other  { background:rgba(255,255,255,.06);color:var(--chalk2); }
.result-text { flex:1; font-size:12px; color:var(--chalk2); line-height:1.7; }
.result-del { background:none; border:none; color:var(--chalk4); cursor:pointer; font-size:11px; padding:0 2px; flex-shrink:0; margin-top:2px; font-family:var(--font); }

.photo-result {
  background:var(--bg2); border-radius:var(--r2); padding:12px 14px;
  margin-bottom:7px; font-size:12px; line-height:1.9; color:var(--chalk2);
}
.photo-result strong { color:var(--chalk); font-weight:700; font-size:11px; letter-spacing:.06em; }
.photo-result .prdel { display:block; margin-top:6px; background:none; border:none; color:var(--chalk4); font-size:10px; cursor:pointer; font-family:var(--font); padding:0; }

.analyzing {
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  background:var(--bg2); border-radius:var(--r2); color:var(--chalk3); font-size:11px;
}
.analyzing .dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); animation:blink .8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

/* Save button */
.save-btn {
  width:100%; padding:17px;
  background:var(--card2); border:2px solid var(--accent2);
  color:var(--accent3); cursor:pointer; font-family:var(--font); font-weight:700;
  font-size:14px; letter-spacing:.2em; border-radius:var(--r); transition:all .25s;
  margin-bottom:24px;
}
.save-btn:hover, .save-btn:active { background:var(--accent2); color:var(--bg); }

/* ── HISTORY ── */
.day-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); margin-bottom:10px; overflow:hidden;
}
.day-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; cursor:pointer; user-select:none;
}
.day-date { font-family:var(--mono); font-size:11px; color:var(--chalk2); }
.day-pills { display:flex; flex-wrap:wrap; gap:4px; }
.dp { font-size:9px; padding:3px 9px; border-radius:20px; font-family:var(--mono); }
.day-body { padding:12px 16px; border-top:1px solid var(--border); display:none; }
.day-card.open .day-body { display:block; }
.de { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
.de:last-child { margin-bottom:0; }
.de-txt { font-size:12px; color:var(--chalk2); line-height:1.7; }

/* ── REPORT ── */
.period-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.period-btn {
  flex:0 0 auto; padding:8px 16px; background:var(--card); border:1px solid var(--border2);
  color:var(--chalk3); cursor:pointer; font-size:11px; letter-spacing:.06em;
  font-family:var(--font); font-weight:500; border-radius:20px; transition:all .2s;
}
.period-btn.active { border-color:var(--accent2); color:var(--accent3); background:var(--card2); }

.chart-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); margin-bottom:14px; overflow:hidden; }
.chart-head { padding:11px 16px; border-bottom:1px solid var(--border); font-size:10px; color:var(--chalk3); letter-spacing:.12em; }
.chart-body { padding:16px; }
.bg { margin-bottom:18px; }
.bg:last-child { margin-bottom:0; }
.bgl { font-size:10px; color:var(--chalk3); margin-bottom:7px; letter-spacing:.06em; }
.bars { display:flex; align-items:flex-end; gap:3px; height:52px; }
.bc { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bf { width:100%; border-radius:6px 6px 0 0; min-height:3px; transition:height .4s ease; background:var(--border2); }
.bf.hi { background:var(--accent2); }
.bdt { font-family:var(--mono); font-size:7px; color:var(--chalk4); }

.ai-run-btn {
  width:100%; padding:16px; background:var(--card2); border:2px solid var(--border2);
  color:var(--chalk2); cursor:pointer; font-family:var(--font); font-weight:700;
  font-size:13px; letter-spacing:.14em; border-radius:var(--r); transition:all .25s; margin-bottom:12px;
}
.ai-run-btn:hover { border-color:var(--accent2); color:var(--accent3); }

.ai-box {
  background:var(--card); border:1px solid var(--border2); border-radius:var(--r);
  padding:20px; margin-bottom:10px; border-left:3px solid var(--accent2);
}
.ai-box h3 { font-size:16px; font-weight:700; color:var(--accent3); margin-bottom:14px; letter-spacing:.06em; }
.ai-box p { font-size:13px; line-height:2.1; color:var(--chalk2); }

.spinner { display:none; text-align:center; padding:24px; font-size:11px; color:var(--chalk3); letter-spacing:.1em; }
.spinner.show { display:block; }
.spin::after { content:''; animation:dots 1.4s infinite; }
@keyframes dots { 0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'} }

/* ── FEEDBACK / PREVIEW ── */
.fb-wrap { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); overflow:hidden; }
.fb-head { padding:10px 14px; background:var(--bg2); border-bottom:1px solid var(--border); font-size:10px; color:var(--accent3); letter-spacing:.12em; font-weight:700; }
.fb-ai-comment { padding:12px 14px; font-size:12px; color:var(--chalk2); line-height:1.8; border-bottom:1px solid var(--border); }
.fb-entry { display:flex; align-items:flex-start; gap:8px; padding:9px 14px; border-bottom:1px solid var(--border); animation:fadeUp .2s ease both; }
.fb-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.fb-actions { display:flex; gap:8px; padding:12px 14px; }
.fb-save { flex:1; padding:12px; background:var(--accent2); color:var(--bg); border:none; border-radius:var(--r2); font-family:var(--font); font-size:13px; font-weight:700; cursor:pointer; letter-spacing:.06em; transition:all .15s; }
.fb-save:hover { background:var(--accent3); }
.fb-discard { padding:12px 16px; background:transparent; border:1px solid var(--border2); color:var(--chalk3); border-radius:var(--r2); font-family:var(--font); font-size:12px; cursor:pointer; transition:all .15s; }
.fb-discard:hover { border-color:var(--chalk3); color:var(--chalk); }
.fb-loading { display:flex; align-items:center; gap:10px; padding:14px; font-size:12px; color:var(--chalk3); }
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ── MULTI-TAG PILLS (history) ── */
.tag-list { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }

/* ── STATS TABLE (Report) ── */
.stat-table { width:100%; border-collapse:collapse; }
.stat-table th { padding:7px 10px; text-align:left; font-size:9px; color:var(--chalk3); font-weight:500; border-bottom:1px solid var(--border); }
.stat-table td { padding:8px 10px; font-size:12px; color:var(--chalk2); border-bottom:1px solid var(--border); }
.stat-table td:not(:first-child) { font-family:var(--mono); font-weight:700; color:var(--accent3); text-align:right; }
.stat-table tr:last-child td { border-bottom:none; }

/* ── HISTORY ENTRY: サムネイル＋アコーディオン ── */
/* テキストは1つの .he-body div のみに存在する。
   閉じた状態: -webkit-line-clamp で3行省略
   開いた状態: clamp解除して全文 + AI分析を表示          */
.he-body {
  font-size:12px; color:var(--chalk2); line-height:1.8;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden; word-break:break-all;
  white-space:pre-wrap; margin-top:5px;
}
.he-open .he-body {
  display:block;          /* -webkit-box を解除 */
  overflow:visible;
  -webkit-line-clamp:unset;
}
.he-ai-wrap { display:none; margin-top:8px; }
.he-open .he-ai-wrap { display:block; }
.he-toggle {
  font-size:9px; color:var(--chalk3); background:none; border:none;
  cursor:pointer; padding:4px 0; font-family:var(--font); letter-spacing:.05em;
  text-decoration:underline; text-underline-offset:2px;
}
.he-ai {
  margin-top:8px; padding:10px 12px;
  background:var(--bg2); border-left:3px solid var(--accent2);
  border-radius:0 var(--r2) var(--r2) 0;
  font-size:11px; color:var(--chalk2); line-height:1.8; white-space:pre-wrap;
}
.he-ai-label { font-size:9px; color:var(--accent3); font-weight:700; letter-spacing:.1em; margin-bottom:4px; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(12px);
  background:var(--card2); border:1px solid var(--border2); color:var(--chalk2);
  padding:10px 22px; font-size:11px; letter-spacing:.06em;
  opacity:0; transition:all .3s; z-index:600; pointer-events:none;
  white-space:nowrap; border-radius:20px; font-family:var(--font);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.empty { text-align:center; padding:52px 20px; font-size:13px; color:var(--chalk3); line-height:2.6; }
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="topbar-title">記録</div>
  <div class="topbar-right">
    <div class="topbar-date" id="top-date"></div>
    <label class="backup-btn" style="cursor:pointer">
      📥 復元
      <input type="file" accept=".json" onchange="restoreBackup(this)" style="display:none">
    </label>
    <button class="backup-btn" onclick="doBackup()">💾 保存</button>
    <button class="backup-btn" onclick="showFixPanel()" style="background:rgba(200,112,96,.2);border-color:var(--red-s);color:var(--red-s)">🛠 修正</button>
  </div>
</div>

<!-- データ修正パネル -->
<div id="fix-panel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;overflow-y:auto;padding:20px">
  <div style="max-width:480px;margin:0 auto">
    <div style="background:#2b342e;border:1px solid #3d4d42;border-radius:14px;padding:20px;margin-bottom:12px">
      <div style="color:#f0d0a8;font-size:16px;font-weight:700;margin-bottom:6px">🛠 データ一括修正</div>
      <div style="color:#6e8872;font-size:11px;margin-bottom:16px">このアプリ内のlocalStorageを直接修正します</div>

      <div style="background:#1e2420;border:1px solid #3d4d42;border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="color:#d4b896;font-size:13px;font-weight:700;margin-bottom:6px">① 全睡眠エントリを眠剤あり＋MP着用に変更</div>
        <div style="color:#6e8872;font-size:11px;margin-bottom:10px">すべての睡眠記録に medication:true・mouthpiece:true をセットします</div>
        <button onclick="fixMedMP()" style="width:100%;padding:13px;background:#c4a070;color:#1e2420;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">✦ 実行する</button>
        <div id="fix-log1" style="margin-top:8px;font-size:11px;color:#b0c4b4;display:none;background:#1e2420;padding:10px;border-radius:6px;max-height:160px;overflow-y:auto;line-height:1.9"></div>
      </div>

      <div style="background:#1e2420;border:1px solid #3d4d42;border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="color:#d4b896;font-size:13px;font-weight:700;margin-bottom:6px">② 睡眠時間を入眠・起床テキストから再計算</div>
        <div style="color:#6e8872;font-size:11px;margin-bottom:10px">「am5時に寝た」「pm13時に起きた」などのテキストから duration_h を自動計算します</div>
        <button onclick="fixSleepDuration()" style="width:100%;padding:13px;background:#c4a070;color:#1e2420;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">✦ 実行する</button>
        <div id="fix-log2" style="margin-top:8px;font-size:11px;color:#b0c4b4;display:none;background:#1e2420;padding:10px;border-radius:6px;max-height:160px;overflow-y:auto;line-height:1.9"></div>
      </div>

// ════════════════════════
// 自動データ移行

// ════════════════════════
function migrateOldData(){
  const oldKeys = ['rec7_entries','rec6_entries','daily_entries','rec_entries'];
  let current = L('kiroku_entries', []);
  let added = 0;
  oldKeys.forEach(key => {

    old.forEach(day => {
      if(day && day.date && !current.find(e => e.date === day.date)){
        current.push(day); added++;
      }
    });
  });

    current.sort((a,b) => b.date.localeCompare(a.date));

}

// ════════════════════════════════════════════════════
// 栄養素推定テーブル＋関数（migrateDataより前に必須 - constはホイストされないため）
// ════════════════════════════════════════════════════
const NUTRITION_DB = {
  ハラミ:    {p:22,f:18,c:0},  カルビ:    {p:18,f:22,c:0},
  鶏むね:    {p:24,f:2,c:0},   鶏もも:    {p:20,f:8,c:0},
  豚カツ:    {p:22,f:20,c:15}, 唐揚げ:    {p:20,f:15,c:12},
  焼肉:      {p:20,f:16,c:0},  牛肉:      {p:20,f:14,c:0},
  豚肉:      {p:18,f:14,c:0},  鶏肉:      {p:22,f:5,c:0},
  魚:        {p:20,f:5,c:0},   刺身:      {p:20,f:3,c:0},
  卵:        {p:6,f:5,c:0},    卵料理:    {p:12,f:10,c:2},
  豆腐:      {p:5,f:3,c:1},    冷奴:      {p:5,f:3,c:1},
  納豆:      {p:7,f:4,c:4},    プロテイン:{p:25,f:2,c:5},
  ご飯:      {p:3,f:0,c:55},   米:        {p:3,f:0,c:55},
  パン:      {p:4,f:4,c:30},   うどん:    {p:3,f:1,c:55},
  ラーメン:  {p:8,f:10,c:55},  パスタ:    {p:7,f:2,c:50},
  サラダ:    {p:2,f:3,c:5},    野菜炒め:  {p:3,f:5,c:8},
  味噌汁:    {p:3,f:1,c:3},    ヨーグルト:{p:4,f:3,c:8},
};
function estimateNutrition(text){
  let p=0, f=0, c=0, matched=[];
  for(const [food, n] of Object.entries(NUTRITION_DB)){
    if(text.includes(food)){ p+=n.p; f+=n.f; c+=n.c; matched.push(food); }
  }
  const proM = text.match(/(?:タンパク質|たんぱく質|プロテイン)\s*(\d+)\s*g/i);
  if(proM) p = +proM[1];
  return { p, f, c, matched };
}

// ════════════════════════════════════════════════════
// DATA MIGRATION v2 — 旧データ構造を最新ロジックに合わせる
// べき等実装。バージョン番号を上げると次回起動時に再適用。
// ════════════════════════════════════════════════════
function migrateData(){
  const DATA_VERSION = 5;  // v5: parseSleepTimes で既存データの睡眠時間を再抽出
  if(L('kiroku_migration_ver',0) >= DATA_VERSION) return;

  const MIG = [
    { cat:'sleep',   re:/睡眠|起床|就寝|入眠|寝た|寝付|眠り|眠れ|眠剤|デエビゴ|マウスピース|中途覚醒|目覚め|不眠|ベッド|布団|起きた|pm.*起|am.*眠|眠りにつ|寝落ち|目が覚/ },
    { cat:'meal',    re:/食事|食べ|朝食|昼食|夕食|ご飯|焼肉|ハラミ|カルビ|豆腐|冷奴|納豆|ヨーグルト|サラダ|タンパク質|たんぱく質|プロテイン|カロリー|ランチ|ディナー/ },
    { cat:'skin',    re:/肌荒れ|肌の調子|ニキビ|乾燥肌|脂っぽ|毛穴|保湿|スキンケア|洗顔|赤み|くすみ/ },
    { cat:'body',    re:/運動|筋トレ|ジョギング|ウォーキング|ランニング|ジム|ストレッチ|スクワット|体重測定/ },
    { cat:'finance', re:/\d+円|支出|収入|交通費|食費|支払い|給料|節約|出費|レシート/ },
  ];

  let all = L('kiroku_entries',[]); let changed = false;
  all.forEach(day => {
    (day.entries||[]).forEach(e => {
      const t = e.details?.raw || e.summary || '';

      // パッチ1: categories を最新ルールで再付与
      const cats = MIG.filter(r=>r.re.test(t)).map(r=>r.cat);
      const newCats = cats.length ? cats : ['other'];
      if(JSON.stringify(e.categories) !== JSON.stringify(newCats)){
        e.categories = newCats; e.category = newCats[0]; changed = true;
      }

      // パッチ2: 睡眠エントリで duration_h が未設定なら parseSleepTimes で再計算
      if(e.category === 'sleep' && !e.details?.duration_h && t){
        const parsed = parseSleepTimes(t);
        if(parsed){
          if(!e.details) e.details = {};
          e.details.duration_h = parsed.duration_h;
          e.details.bed_time   = e.details.bed_time  || parsed.bed_time;
          e.details.wake_time  = e.details.wake_time || parsed.wake_time;
          changed = true;
        }
      }

      // パッチ3: 食事エントリで protein_g が未設定なら estimateNutrition で推定
      if(e.category === 'meal' && !e.details?.protein_g && t){
        const nutr = estimateNutrition(t);
        if(nutr.p > 0){
          if(!e.details) e.details = {};
          e.details.protein_g = nutr.p;
          changed = true;
        }
      }

      // パッチ4: details.raw 補完
      if(e.details && !e.details.raw && e.summary){ e.details.raw = e.summary; changed=true; }
      // パッチ5: ts 補完
      if(!e.ts){ e.ts = new Date(day.date.replace(/\./g,'-')).getTime()||Date.now(); changed=true; }
      // パッチ6: _pending_ai フラグ残骸を削除
      if(e.details?._pending_ai){ delete e.details._pending_ai; changed=true; }
    });
  });
  if(changed) S('kiroku_entries', all);
  S('kiroku_migration_ver', DATA_VERSION);
  console.log('[kiroku] migration v5 applied');
}

migrateData();          // ← 新：カテゴリ再付与など最新ロジックをまとめて適用

function calcStreak(){
  const all = getAll();
  if(!all.length) return 0;
  let streak = 0;
  const d = new Date(TODAY);
  while(true){
    const key = fmt(d);
    if(all.find(e=>e.date===key)) streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

const IDEAL_SLEEP = 7.5;

function calcSleepDebt(days = 14){
  const all = getAll();
  let debt = 0, counted = 0;
  for(let i = 0; i < days; i++){
    const d = new Date(TODAY); d.setDate(d.getDate() - i);
    const day = all.find(e => e.date === fmt(d));
    if(!day) continue;
    const sleepE = day.entries?.find(e => e.category==='sleep' && e.details?.duration_h);
    if(sleepE){ debt += IDEAL_SLEEP - (sleepE.details.duration_h || 0); counted++; }
  }
  return { debt: Math.round(debt * 10) / 10, days: counted };
}

function buildSleepDebtBanner(){
  const { debt, days } = calcSleepDebt(14);
  if(days === 0) return '';
  const isDebt = debt > 0;
  const absDebt = Math.abs(debt);
  const color = isDebt ? (debt > 5 ? 'var(--red-s)' : 'var(--accent2)') : 'var(--green-s)';
  const icon = isDebt ? (debt > 5 ? '😪' : '💤') : '✨';
  const label = isDebt ? `${absDebt}時間の睡眠借金` : `${absDebt}時間のプラス貯金`;
  const sub = isDebt ? `理想${IDEAL_SLEEP}hに対して直近${days}日間で${absDebt}h不足` : `直近${days}日間、理想以上に眠れています`;
  return `<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1px solid ${color}33;border-left:3px solid ${color};border-radius:var(--r);margin-bottom:14px">

}

function toggleVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('このブラウザは音声入力非対応です'); return; }
  if(isRec){ recog?.stop(); return; }
  recog = new SR(); recog.lang='ja-JP'; recog.continuous=true; recog.interimResults=false;
  isRec = true;
  const btn = document.getElementById('big-mic');
  if(btn){ btn.classList.add('rec'); btn.querySelector('.mic-main').textContent='録音中… タップで停止'; }
  document.getElementById('ta-wrap')?.classList.add('show');
  recog.onresult = ev => {
    const t = Array.from(ev.results).slice(ev.resultIndex).map(r=>r[0].transcript).join('');
    const ta = document.getElementById('ta');
    if(ta) ta.value += (ta.value?'\n':'') + t;
  };
  const stop = () => {
    isRec = false;
    const b = document.getElementById('big-mic');
    if(b){ b.classList.remove('rec'); b.querySelector('.mic-main').textContent='タップして話す'; }
  };
  recog.onend = stop;
  recog.onerror = () => { stop(); showToast('音声認識に失敗しました'); };
  recog.start();
}

// PHOTO ATTACH (multi, album)
// ════════════════════════
// attachedPhotos: { meal: [b64, b64, ...], skin: [...], receipt: [...] }
function attachPhotos(input, type){
  const files = Array.from(input.files);
  if(!files.length) return;
  if(!attachedPhotos[type]) attachedPhotos[type] = [];
  files.forEach(file => {
    if(attachedPhotos[type].length >= 3){ showToast('1カテゴリ最大3枚まで'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      attachedPhotos[type].push(ev.target.result);
      renderPhotoRow(type);
      document.getElementById('ta-wrap')?.classList.add('show');
    };
    reader.readAsDataURL(file);
  });
}

function removePhotoAt(type, idx){
  if(!attachedPhotos[type]) return;
  attachedPhotos[type].splice(idx, 1);
  renderPhotoRow(type);
}

function renderPhotoRow(type){
  const icons = {meal:'🍱',skin:'✨',receipt:'🧾'};
  const row = document.getElementById('photo-row-'+type);
  if(!row) return;
  const photos = attachedPhotos[type] || [];
  // Keep the add button, replace thumbnails
  const addBtn = row.querySelector('label');
  row.innerHTML = '';
  photos.forEach((b64, i) => {
    const div = document.createElement('div');
    div.style.cssText = 'position:relative;width:72px;height:72px;flex-shrink:0';
    div.innerHTML = `<img src="${b64}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1.5px solid var(--border2)">
      <button onclick="removePhotoAt('${type}',${i})" style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>`;
    row.appendChild(div);
  });
  if(photos.length < 3) row.appendChild(addBtn);
}

// Legacy single-photo remove (keep for compatibility)
function removePhoto(e, key){
  e.stopPropagation();
  attachedPhotos[key] = [];
  renderPhotoRow(key);
}

// Auto-detect date from text like "2/25" or "3月1日"
function detectDateFromText(text){
  const y = TODAY.getFullYear();
  // Patterns: 2/25, 2月25日, 02/25
  const m1 = text.match(/(\d{1,2})[\/月](\d{1,2})/);
  if(m1){
    const mo = String(m1[1]).padStart(2,'0');
    const da = String(m1[2]).padStart(2,'0');
    const candidate = `${y}.${mo}.${da}`;
    // Only use if it's today or in the past
    if(candidate <= todayKey) return candidate;
  }
  return null;
}

// キーワード → 複数カテゴリ自動付与

// キーワード → 複数カテゴリ自動付与（相互干渉防止版）
// ════════════════════════════════════════════════════
const KEYWORD_RULES = [
  { cat:'sleep',
    re: /睡眠|起床|就寝|入眠|寝た|寝付|眠り|眠れ|眠剤|デエビゴ|マウスピース|中途覚醒|目覚め|不眠|ベッド|布団|眠りにつ|寝落ち|目を覚|起きた時|時に起き/ },
  { cat:'meal',
    re: /食事|食べ|朝食|昼食|夕食|ご飯|焼肉|ハラミ|カルビ|豚カツ|唐揚げ|豆腐|冷奴|納豆|鶏むね|鶏もも|サラダ|味噌汁|ヨーグルト|ランチ|ディナー|朝ごはん|昼ごはん|夕ごはん|タンパク質|たんぱく質|プロテイン/ },
  { cat:'skin',
    re: /肌荒れ|肌の調子|ニキビ|乾燥肌|脂っぽ|毛穴|保湿|スキンケア|洗顔|赤み|くすみ|化粧水|肌が/ },
  { cat:'body',
    re: /運動|筋トレ|ジョギング|ウォーキング|ランニング|ジム|ストレッチ|スクワット|腹筋|散歩した|体重測定|体脂肪/ },
  { cat:'finance',
    re: /\d+円|支出|収入|交通費|食費|支払い|給料|節約|出費|レシート|コンビニで|スーパーで/ },
];

// 複数カテゴリをすべて返す（配列）
function autoCategories(text){
  const cats = [];
  for(const r of KEYWORD_RULES){
    if(r.re.test(text)) cats.push(r.cat);
  }
  return cats.length ? cats : ['other'];
}

// 単一カテゴリ用（既存互換）
function autoCategory(text){ return autoCategories(text)[0]; }

// ════════════════════════════════════════════════════
// 睡眠時間抽出エンジン（曖昧テキスト対応）
// 例: "am 4半に眠りにつきPm13時過ぎ起きた" → { bed:4.5, wake:13.0, duration:8.5 }
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
// 睡眠時間抽出エンジン v3
// 対応パターン:
//   「Am 5時前に入眠し Am 11時ごろに目を覚ました」
//   「何時に起きた・何時に寝た」
//   「3時に就寝して13時に起床」
//   「夜中の2時に寝て昼の1時に起きた」
// ════════════════════════════════════════════════════
function calculateSleepDuration(text){
  if(!text) return null;

  // 全角→半角、改行→スペース
  const t = text
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[：]/g, ':')
    .replace(/\n/g, ' ');

  // 「半」→「30分」に前処理
  const normalized = t.replace(/(\d{1,2})\s*時半/g, '$1時30分');

  // AM/PM考慮の時刻→10進数変換
  function toH(hour, min, ampm, context){
    let h = parseInt(hour), m = parseInt(min||0);
    const ap = (ampm||'').toLowerCase().replace(/\s/g,'');
    if(ap==='pm'||ap==='午後') { if(h<12) h+=12; }
    else if(ap==='am'||ap==='午前') { if(h===12) h=0; }
    else {
      // AM/PM未記載の場合：文脈から推定
      // 「夜中・深夜・就寝・夜」→深夜扱い（0〜5時 または 20〜23時）
      // 「昼・午後・起きた・起床」→昼以降
      if(/夜中|深夜|夜に寝|夜寝/.test(context) && h>=1 && h<=6) { /* そのまま */ }
      else if(/昼|午後/.test(context) && h>=1 && h<=11) h+=12;
    }
    return h + m/60;
  }

  // 入眠パターン（より広く）
  const sleepPatterns = [
    // 「am5時に入眠」「午前5時ごろ寝た」「5時30分に就寝」
    /(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?\s*(?:前|過ぎ|ごろ|頃|ぐらい|くらい|半)?\s*(?:に|ごろ|頃|ぐらい)?\s*(?:入眠|寝た|寝付|就寝|眠りにつ|眠った|ベッド|布団|寝ました|眠りました)/i,
    // 「寝たのが5時」「就寝は23時」
    /(?:寝たの|就寝は?|入眠は?|眠りについたの)\s*(?:が|は)?\s*(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?/i,
    // 「5時に寝て」「23時に就寝して」
    /(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?\s*(?:前|過ぎ|ごろ)?\s*に\s*(?:寝て|就寝して|眠って)/i,
  ];

  // 起床パターン（より広く）
  const wakePatterns = [
    // 「pm13時ごろ目を覚ました」「11時に起きた」
    /(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?\s*(?:前|過ぎ|ごろ|頃|ぐらい|くらい|半)?\s*(?:に|ごろ|頃)?\s*(?:起き|起床|目覚め|目を覚|起きました|起床しました|目が覚めました)/i,
    // 「起きたのが13時」「起床は7時」
    /(?:起きたの|起床は?|目覚めは?)\s*(?:が|は)?\s*(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?/i,
    // 「13時に起きて」
    /(am|pm|午前|午後)?\s*(\d{1,2})\s*時(?:(\d{1,2})\s*分)?\s*(?:前|過ぎ|ごろ)?\s*に\s*(?:起きて|起床して)/i,
  ];

  let sleepH = null, wakeH = null;

  for(const p of sleepPatterns){
    const m = normalized.match(p);
    if(m){
      // グループ位置が正規表現によって異なる
      const groups = [...m];
      const ampm = groups.find((g,i)=>i>0&&/am|pm|午前|午後/i.test(g||''))||'';
      const hourStr = groups.find((g,i)=>i>0&&/^\d{1,2}$/.test(g||'')&&parseInt(g)<=24)||null;
      const minStr  = groups.filter((g,i)=>i>0&&/^\d{1,2}$/.test(g||'')).slice(1)[0]||'0';
      if(hourStr){ sleepH = toH(hourStr, minStr, ampm, normalized); break; }
    }
  }

  for(const p of wakePatterns){
    const m = normalized.match(p);
    if(m){
      const groups = [...m];
      const ampm = groups.find((g,i)=>i>0&&/am|pm|午前|午後/i.test(g||''))||'';
      const hourStr = groups.find((g,i)=>i>0&&/^\d{1,2}$/.test(g||'')&&parseInt(g)<=24)||null;
      const minStr  = groups.filter((g,i)=>i>0&&/^\d{1,2}$/.test(g||'')).slice(1)[0]||'0';
      if(hourStr){ wakeH = toH(hourStr, minStr, ampm, normalized); break; }
    }
  }

  if(sleepH===null||wakeH===null) return null;

  // 日またぎ判定
  if(sleepH > wakeH) wakeH += 24;
  const duration = Math.round((wakeH - sleepH) * 10) / 10;
  if(duration <= 0 || duration > 16) return null;

  const toHHMM = h => {
    const hh = Math.floor(h % 24);
    const mm = Math.round((h % 1) * 60);
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  };

  return {
    bed_time:   toHHMM(sleepH),
    wake_time:  toHHMM(wakeH % 24),
    duration_h: duration,
  };
}

// 旧名互換
function parseSleepTimes(text){ return calculateSleepDuration(text); }

// ════════════════════════════════════════════════════
// AI フィードバック生成 v3
// ・historyData: 過去データ配列（省略時は localStorage から取得）
// ・睡眠：前日比較、マウスピース影響
// ・食事：タンパク質・脂質・糖質の推定値
// ・要件通りの専門的コメントを出力
// ════════════════════════════════════════════════════

function generateAIResponse(text, historyData){
  if(!text) return '';
  const all    = historyData || getAll();
  const recent = all.slice(0, 14); // 直近2週間
  const parts  = [];

  // ── 睡眠専門家の分析（バリエーション豊富）
  if(KEYWORD_RULES.find(r=>r.cat==='sleep')?.re.test(text)){
    const parsed = parseSleepTimes(text);
    const dur    = parsed?.duration_h ?? (() => {
      const m = text.match(/(\d+(?:\.\d+)?)\s*時間/); return m ? +m[1] : null;
    })();
    const bedT   = parsed?.bed_time ?? null;
    const wakeT  = parsed?.wake_time ?? null;
    const hasMP  = /マウスピース/.test(text);
    const hasMed = /眠剤|デエビゴ/.test(text);

    // 過去データを取得
    const sleepHistory = recent
      .flatMap(d=>d.entries||[])
      .filter(e=>e.category==='sleep' && e.details?.duration_h)
      .slice(0, 7);
    const prevH   = sleepHistory[0]?.details?.duration_h ?? null;
    const avgH    = sleepHistory.length
      ? Math.round(sleepHistory.reduce((s,e)=>s+e.details.duration_h,0)/sleepHistory.length*10)/10
      : null;
    const mpDays  = sleepHistory.filter(e=>e.details?.mouthpiece).length;
    const medDays = sleepHistory.filter(e=>e.details?.medication).length;

    // 入眠ばらつき計算
    const bedTimes = sleepHistory.filter(e=>e.details?.bed_time).map(e=>{
      const [h,m]=e.details.bed_time.split(':').map(Number);
      return h>=20 ? h+m/60 : h+24+m/60; // 深夜またぎを考慮
    });
    const bedVariance = bedTimes.length >= 3
      ? (() => {
          const avg = bedTimes.reduce((s,v)=>s+v,0)/bedTimes.length;
          return Math.round(Math.sqrt(bedTimes.reduce((s,v)=>s+(v-avg)**2,0)/bedTimes.length)*60);
        })()
      : null; // 分単位の標準偏差

    let msg = '【睡眠専門家の分析】\n';

    if(dur !== null){
      // 前日比・平均比の具体的コメント
      if(prevH !== null && avgH !== null){
        const diffPrev = Math.round((dur - prevH)*10)/10;
        const diffAvg  = Math.round((dur - avgH)*10)/10;
        msg += `今回の睡眠は${dur}時間。前日（${prevH}h）比${diffPrev>=0?'+':''}${diffPrev}h、直近平均（${avgH}h）比${diffAvg>=0?'+':''}${diffAvg}hです。`;
        if(dur >= 7.5) msg += `\n理想の7.5時間を達成！`;
        else if(dur < 6) msg += `\n6時間を下回っており、パフォーマンス・代謝への影響が出やすい水準です。今夜は30分早く就寝することを意識してみましょう。`;
        else msg += `\nあと${(7.5-dur).toFixed(1)}時間で理想の7.5時間に届きます。`;
      } else {
        msg += `今回の睡眠は${dur}時間。`;
        if(dur >= 7.5) msg += `理想的な睡眠時間が確保できています！`;
        else if(dur < 6) msg += `やや短めです。就寝時刻を少し前倒しにする工夫が効果的です。`;
        else msg += `引き続き記録を続けると、理想的なリズムが見えてきます。`;
      }
    }

    if(bedT && wakeT){
      msg += `\n就寝${bedT}・起床${wakeT}。`;
    }

    if(hasMP && hasMed){
      msg += `\nデエビゴ＋マウスピース併用ですね。`;
      if(mpDays > 0) msg += `過去${mpDays}日のMP使用データと比較すると、`;
      msg += `マウスピース装着時は口が開きやすく中途覚醒リスクがあります。起床時の乾燥感・疲労感を次回も記録してください。`;
    } else if(hasMP){
      msg += `\nマウスピース着用の夜。`;
      if(bedVariance !== null && bedVariance > 60) msg += `ここ数日の入眠時刻のばらつきが約${bedVariance}分あります。毎日同じ時刻に就寝することで睡眠効率が上がります。`;
      else msg += `就寝時刻を一定に保つことで、マウスピース装着時でも深い睡眠が得やすくなります。`;
    } else if(hasMed){
      msg += `\n眠剤使用の夜。`;
      if(medDays >= 5) msg += `直近${medDays}日間継続使用中。薬の効果が出る時間帯と中途覚醒の有無を記録すると、最適な服用タイミングが見えてきます。`;
      else msg += `翌朝の疲労感も記録しておくと、薬の有効性を客観的に評価できます。`;
    }

    if(bedVariance !== null){
      if(bedVariance > 90) msg += `\n⚠ 直近の入眠時刻のばらつきが${bedVariance}分と大きめです。就寝時刻を±30分以内に安定させると睡眠の質が向上します。`;
      else if(bedVariance <= 30) msg += `\n✓ 入眠時刻が安定しています（ばらつき${bedVariance}分）。規則正しいリズムが維持できています。`;
    }

    parts.push(msg);
  }

  // ── 栄養士の分析（P/F/C推定＋過去比較）
  if(KEYWORD_RULES.find(r=>r.cat==='meal')?.re.test(text)){
    const nutr    = estimateNutrition(text);
    const mealHistory = recent.flatMap(d=>d.entries||[]).filter(e=>e.category==='meal');
    const avgProtein  = mealHistory.filter(e=>e.details?.protein_g)
      .reduce((s,e,_,a)=>s+e.details.protein_g/a.length, 0);
    const mealDays    = recent.filter(d=>d.entries?.some(e=>e.category==='meal')).length;

    let msg = '【栄養士の分析】\n';
    if(nutr.matched.length > 0){
      msg += `${nutr.matched.slice(0,4).join('・')}を確認しました。`;
      if(nutr.p > 0 || nutr.f > 0 || nutr.c > 0){
        msg += `\n推定栄養素 → タンパク質:${nutr.p}g / 脂質:${nutr.f}g / 糖質:${nutr.c}g`;
      }
      if(avgProtein > 0){
        const diffP = Math.round(nutr.p - avgProtein);
        msg += `\n直近のタンパク質平均${Math.round(avgProtein)}gと比べると今回は${diffP>=0?'+':''}${diffP}g。`;
      }
      if(nutr.p >= 25) msg += `\nタンパク質${nutr.p}gは筋肉合成に十分な量です。運動後30分以内に摂取できると効率が最大化されます。`;
      else if(nutr.p >= 15) msg += `\nタンパク質は確保できています。あと${25-nutr.p}g追加できれば理想的です（卵1個≒6g、豆腐100g≒5g）。`;
      else if(nutr.p > 0) msg += `\nタンパク質がやや少なめです。鶏むね肉・卵・豆腐などを1品追加するとボディメイクに直結します。`;
      if(nutr.f > 25) msg += `\n脂質が高めです。次の食事では和食（味噌汁・納豆・卵）中心にすると消化にも優しくバランスが整います。`;
    } else {
      msg += `食事を記録しました。${mealDays>=5?`直近${mealDays}日間継続して食事記録できています！`:''}食材名も含めて記録すると栄養素の推定ができます（例：鶏むね・卵・豆腐など）。`;
    }
    parts.push(msg);
  }

  // ── トレーニング分析（週間データ比較）
  if(KEYWORD_RULES.find(r=>r.cat==='body')?.re.test(text)){
    const durM    = text.match(/(\d+)\s*分/);
    const dur     = durM ? +durM[1] : null;
    const typeM   = text.match(/筋トレ|ジョギング|ウォーキング|散歩|ランニング|ジム|ストレッチ|スクワット/);
    const exDays  = recent.slice(0,7).filter(d=>d.entries?.some(e=>e.category==='body')).length;
    const exMins  = recent.slice(0,7).flatMap(d=>d.entries||[])
      .filter(e=>e.category==='body'&&e.details?.duration_min)
      .reduce((s,e)=>s+e.details.duration_min,0);

    let msg = '【トレーニングの分析】\n';
    if(dur){
      msg += `${typeM?typeM[0]:'運動'}${dur}分を記録。`;
      msg += dur >= 30
        ? `有酸素運動は20分超から脂肪燃焼モードに入ります。この時間は非常に効果的です。`
        : `短時間でも継続が大切です。`;
    } else {
      msg += `${typeM?typeM[0]:'運動'}を記録しました。`;
    }
    if(exDays >= 3) msg += `\n今週${exDays}日達成${exMins>0?`、合計${exMins}分`:''}。週3回以上で代謝改善効果が高まります。`;
    else msg += `\n今週はまだ${exDays}日です。週3回を目標に積み上げましょう。`;
    msg += `\n睡眠との相関も注目してください。運動翌日の睡眠スコアが改善する傾向がある方が多いです。`;
    parts.push(msg);
  }

  // ── 収支分析
  if(KEYWORD_RULES.find(r=>r.cat==='finance')?.re.test(text)){
    const amtM  = text.match(/(\d[\d,]*)\s*円/);
    const amt   = amtM ? +amtM[1].replace(/,/g,'') : null;
    const isInc = /収入|給料/.test(text);
    const wkExp = recent.slice(0,7).reduce((s,d)=>s+(d.entries||[])
      .filter(e=>e.category==='finance'&&e.details?.transaction_type==='expense')
      .reduce((ss,e)=>ss+(e.details?.amount||0),0),0);
    const moExp = recent.reduce((s,d)=>s+(d.entries||[])
      .filter(e=>e.category==='finance'&&e.details?.transaction_type==='expense')
      .reduce((ss,e)=>ss+(e.details?.amount||0),0),0);
    let msg = '【収支の分析】\n';
    if(isInc && amt) msg += `収入${amt.toLocaleString()}円を記録。`;
    else if(amt){
      msg += `${amt.toLocaleString()}円の支出。`;
      msg += `今週累計:¥${(wkExp+amt).toLocaleString()} / 直近2週間累計:¥${(moExp+amt).toLocaleString()}。`;
      if(amt > 10000) msg += `\n大きめの出費ですね。カテゴリ別に記録すると月末の削減ポイントが明確になります。`;
    } else msg += `収支を記録。金額も入力すると週・月の支出パターン分析ができます。`;
    parts.push(msg);
  }

  // ── 肌分析（睡眠・食事との相関を具体的に提示）
  if(KEYWORD_RULES.find(r=>r.cat==='skin')?.re.test(text)){
    const hasDry  = /乾燥/.test(text);
    const hasAcne = /ニキビ/.test(text);
    const prevSleep = recent.flatMap(d=>d.entries||[])
      .find(e=>e.category==='sleep'&&e.details?.duration_h)?.details?.duration_h ?? null;
    let msg = '【肌専門家の分析】\n';
    if(hasDry && hasAcne) msg += `乾燥とニキビの同時発生はインナードライの可能性があります。洗顔後すぐ（3分以内）の保湿が重要です。${prevSleep&&prevSleep<6?`直近の睡眠が${prevSleep}時間と短め—睡眠不足が皮脂バランスを乱している可能性があります。`:``}`;
    else if(hasDry) msg += `乾燥の原因は睡眠不足・水分不足・洗顔後の保湿遅延が多いです。${prevSleep?`直近の睡眠${prevSleep}時間と合わせて相関を確認してみましょう。`:'睡眠記録と照らし合わせると悪化パターンが特定できます。'}`;
    else if(hasAcne) msg += `ニキビは食事・睡眠・ストレスの3要因が複合します。${prevSleep&&prevSleep<6?`直近睡眠${prevSleep}hと睡眠不足が続いています—皮脂分泌が増えやすい状態です。`:'今日の食事・睡眠データと照らし合わせてパターンを探してみましょう。'}`;
    else msg += `肌の状態を記録しました。継続記録で食事・睡眠との相関が見えてきます。`;
    parts.push(msg);
  }

  if(parts.length === 0){
    parts.push('【AI分析】記録しました。データが蓄積されるほど、より詳細な分析ができるようになります。継続が力です！');
  }
  return parts.join('\n\n');
}

// ════════════════════════════════════════════════════
// テキスト解析：複数カテゴリのエントリ配列を返す
// ルール:
//   ・details.raw = 入力テキスト全文（絶対に改変しない）
//   ・summary     = カテゴリラベル＋数値だけの短い識別子（要約ではない）
//     履歴UIでは summary ではなく details.raw を表示する
//   ・ai_comment  = generateAIResponse の出力を保存
// ════════════════════════════════════════════════════
function parseTextLocal(text){
  const entries = [];
  const cats = autoCategories(text);
  // AI コメントは全カテゴリを通じて1回だけ生成
  const aiComment = generateAIResponse(text);

  cats.forEach(cat => {
    // ── details: 生テキストは必ず raw に保存（改変禁止）
    const details = { raw: text, ai_comment: aiComment };
    let summary = '';  // summary は数値・識別子のみ。表示には使わない

    if(cat === 'sleep'){
      // まず parseSleepTimes で曖昧テキストから時刻・時間を抽出
      const parsed = parseSleepTimes(text);
      if(parsed){
        details.duration_h = parsed.duration_h;
        details.bed_time   = parsed.bed_time;
        details.wake_time  = parsed.wake_time;
      } else {
        // フォールバック: 「7時間」などの直書きパターン
        const durM  = text.match(/(\d+(?:\.\d+)?)\s*時間/);
        const bedM  = text.match(/(?:入眠|就寝|寝た)[^\d]*(\d{1,2})[時:：](\d{0,2})/);
        const wakeM = text.match(/(?:起床|起きた)[^\d]*(\d{1,2})[時:：](\d{0,2})/);
        if(durM)  details.duration_h = +durM[1];
        if(bedM)  details.bed_time   = `${bedM[1].padStart(2,'0')}:${(bedM[2]||'00').padStart(2,'0')}`;
        if(wakeM) details.wake_time  = `${wakeM[1].padStart(2,'0')}:${(wakeM[2]||'00').padStart(2,'0')}`;
      }
      details.medication = /眠剤|デエビゴ/.test(text);
      details.mouthpiece = /マウスピース/.test(text);
      // summary = 識別子のみ（生テキストを含まない）
      const parts = [];
      if(details.duration_h) parts.push(`${details.duration_h}h`);
      if(details.bed_time)   parts.push(`就寝${details.bed_time}`);
      if(details.wake_time)  parts.push(`起床${details.wake_time}`);
      if(details.medication) parts.push('眠剤');
      if(details.mouthpiece) parts.push('MP');
      summary = parts.length ? parts.join(' ') : '睡眠';
    }
    else if(cat === 'meal'){
      const calM  = text.match(/(\d+)\s*kcal/i);
      const proM  = text.match(/(?:タンパク質|たんぱく質|プロテイン)\s*(\d+)\s*g/i);
      const typeM = text.match(/朝食|昼食|夕食|間食|朝ごはん|昼ごはん|夕ごはん/);
      if(calM)  details.calories_est = +calM[1];
      if(typeM) details.meal_type    = typeM[0];
      // 栄養素推定（食材辞書ベース）
      const nutr = estimateNutrition(text);
      details.protein_g = proM ? +proM[1] : (nutr.p || null);
      details.fat_g     = nutr.f || null;
      details.carbs_g   = nutr.c || null;
      const parts = [];
      if(details.meal_type)    parts.push(details.meal_type);
      if(details.protein_g)    parts.push(`P:${details.protein_g}g`);
      if(details.fat_g)        parts.push(`F:${details.fat_g}g`);
      if(details.calories_est) parts.push(`${details.calories_est}kcal`);
      summary = parts.length ? parts.join(' ') : '食事';
    }
    else if(cat === 'body'){
      const durM = text.match(/(\d+)\s*分/);
      const typM = text.match(/筋トレ|ジョギング|ウォーキング|散歩|ランニング|ジム|ストレッチ|スクワット/);
      if(durM) details.duration_min  = +durM[1];
      if(typM) details.exercise_type = typM[0];
      summary = [details.exercise_type, details.duration_min?`${details.duration_min}分`:''].filter(Boolean).join(' ') || '運動';
    }
    else if(cat === 'finance'){
      const amtM = text.match(/(\d[\d,]*)\s*円/);
      const isInc = /収入|給料/.test(text);
      if(amtM){ details.amount = +amtM[1].replace(/,/g,''); details.transaction_type = isInc?'income':'expense'; }
      summary = details.amount ? `${isInc?'収入':'支出'} ¥${details.amount.toLocaleString()}` : '収支';
    }
    else if(cat === 'skin'){
      const st = ['乾燥肌','ニキビ','赤み','脂っぽ','くすみ'].filter(k=>text.includes(k));
      summary = st.length ? st.join('・') : '肌';
    }
    else {
      summary = 'その他';
    }

    entries.push({ category:cat, categories:cats, summary, details, ts:Date.now() });
  });

  return entries;
}

// STEP 1: 解析ボタン → 結果プレビュー表示（まだ保存しない）
// ════════════════════════════════════════════════════
let pendingEntries = [];   // 確認待ちのエントリ
let pendingAiComment = ''; // AIコメント

let _isAnalyzing = false;  // 解析二重実行防止フラグ

async function runAnalyze(e){
  if(e) e.preventDefault();
  if(_isAnalyzing){ return; }

  const text = (document.getElementById('ta')?.value || '').trim();
  const hasPhotos = Object.values(attachedPhotos).some(a=>Array.isArray(a)?a.length>0:!!a);
  if(!text && !hasPhotos){ showToast('テキストか写真が必要です'); return; }

  _isAnalyzing = true;
  const btn = document.getElementById('submit-btn');
  if(btn){ btn.disabled=true; btn.textContent='解析中…'; }

  try{
    const fb = document.getElementById('ai-feedback');
    if(fb){ fb.style.display='block'; fb.innerHTML=`<div class="fb-loading"><div class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:blink .8s ease-in-out infinite;flex-shrink:0"></div><span>AIが解析しています…</span></div>`; }

    // 日付自動検出
    if(text){
      const det = detectDateFromText(text);
      if(det && det !== saveDate){
        saveDate = det;
        const inp = document.getElementById('save-date-input'); if(inp) inp.value=det.replace(/\./g,'-');
        const badge = document.getElementById('save-date-badge'); if(badge) badge.textContent = det===todayKey?'今日':'過去の日付（自動検出）';
        const sb = document.getElementById('save-btn'); if(sb) sb.textContent = det===todayKey?'今日の記録を保存する':`${det} の記録を保存する`;
      }
    }

    // ── テキスト解析（複数カテゴリ）
    pendingEntries = [];
    if(text) pendingEntries = parseTextLocal(text);

    // ── 実AI呼び出し（失敗したらローカル解析で続行）
    let usedRealAI = false;
    if(text && pendingEntries.length){
      try{
        const prompt = `以下は生活記録テキストです。\nテキスト:「${text}」\n含まれるすべての記録を抽出し以下のJSON形式のみで（前置き不要）:\n{"entries":[{"category":"sleep/meal/skin/body/finance/other","categories":["sleep","meal"等複数可],"summary":"50字以内","details":{"duration_h":数値,"quality":1-5,"medication":bool,"mouthpiece":bool,"bed_time":"HH:MM","wake_time":"HH:MM","meal_type":"朝/昼/夕/間食","calories_est":数値,"protein_g":数値,"exercise_type":"","duration_min":数値,"transaction_type":"expense/income","amount":数値,"label":"","raw":"テキスト原文"}}]}\n複数カテゴリの記録は別entryで分けること。`;
        const res = await fetch('https://api.anthropic.com/v1/messages',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content:prompt}] }) });
        const d = await res.json();
        const raw = d.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(raw);
        if(parsed.entries?.length){
          pendingEntries = parsed.entries.map(en=>{
            if(!en.categories||!en.categories.length) en.categories=[en.category||'other'];
            en.ts=Date.now(); en.details=en.details||{}; if(!en.details.raw) en.details.raw=text;
            return en;
          });
          usedRealAI = true;
        }
      }catch(err){ console.log('AI unavailable, using local parse'); }
    }

    // 写真解析
    for(const type of ['meal','skin','receipt']){
      const photos = Array.isArray(attachedPhotos[type]) ? attachedPhotos[type] : [];
      for(const b64 of photos){
        const result = await analyzeImageWithAI(type, b64);
        if(!result) continue;
        if(type==='receipt'){
          try{
            const pj=JSON.parse(result);
            pendingEntries.push({category:'finance',categories:['finance'],summary:`支出 ¥${(pj.total||0).toLocaleString()} ${pj.store||''}`,details:{transaction_type:'expense',amount:pj.total,label:`${pj.store||''}(${pj.category||''})`,raw:'レシート'},ts:Date.now()});
          }catch{ pendingEntries.push({category:'other',categories:['other'],summary:result.slice(0,80),details:{raw:result},ts:Date.now()}); }
        } else {
          pendingEntries.push({category:type,categories:[type],summary:`${type==='skin'?'肌':'食事'}写真を解析しました`,details:{ai_result:result,photo_b64:b64,raw:''},ts:Date.now()});
        }
      }
    }

    // AIコメント生成（generateAIResponse — 専門的フィードバック、オウム返し禁止）
    pendingAiComment = generateAIResponse(text);

    // プレビュー表示
    showFeedbackPreview(pendingEntries, pendingAiComment, usedRealAI);

  } catch(outerErr){
    console.error('runAnalyze error:', outerErr);
    showToast('解析中にエラーが発生しました');
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='✦ AIで解析'; }
    _isAnalyzing = false;
  }
}

function showFeedbackPreview(entries, aiComment, usedRealAI){
  const fb = document.getElementById('ai-feedback');
  if(!fb) return;
  fb.style.display = 'block';

  const entriesHtml = entries.map((e,i) => {
    const cats = e.categories || [e.category];
    const tagHtml = cats.map(c=>`<span class="cat-pill ${CAT_CLS[c]||'cp-other'}">${CAT_LBL[c]||c}</span>`).join('');
    return `<div class="fb-entry">
      <div style="flex:1">
        <div class="fb-tags">${tagHtml}</div>
        <div style="font-size:12px;color:var(--chalk2);margin-top:5px;line-height:1.7">${e.summary}</div>
      </div>
    </div>`;
  }).join('');

  fb.innerHTML = `
    <div class="fb-wrap">
      <div class="fb-head">✦ 解析結果プレビュー — ${entries.length}件 ${usedRealAI?'（AI解析）':'（ローカル解析）'}</div>
      <div class="fb-ai-comment">${aiComment.replace(/\n/g,'<br>')}</div>
      ${entriesHtml}
      <div class="fb-actions">
        <button class="fb-save" onclick="commitSave()">✦ この内容で保存する</button>
        <button class="fb-discard" onclick="discardFeedback()">破棄</button>
      </div>
    </div>`;
}

// STEP 3: 確認後に保存（二重保存防止フラグ付き）
// ════════════════════════════════════════════════════
let _isSaving = false;  // 二重保存防止フラグ

function commitSave(){
  // ── 二重保存ガード
  if(_isSaving){ return; }
  if(!pendingEntries.length){ showToast('保存する内容がありません'); return; }

  _isSaving = true;

  try{
    const targetDate = saveDate || todayKey;
    // pendingEntriesを先にコピーしてからクリア（クロージャ問題防止）
    // ai_comment が未設定のエントリに生成してセット
    const toSave = pendingEntries.slice().map(e=>{
      if(e.details && !e.details.ai_comment && e.details.raw){
        e.details.ai_comment = generateAIResponse(e.details.raw);
      }
      return e;
    });
    pendingEntries = [];  // 先にクリアして二重呼び出しを防ぐ
    pendingAiComment = '';

    const all = getAll();
    const idx = all.findIndex(d=>d.date===targetDate);
    if(idx>=0){
      all[idx].entries = [...(all[idx].entries||[]), ...toSave];
      if(selectedMood) all[idx].mood = selectedMood;
      all[idx].ts = Date.now();
    } else {
      const ne = {date:targetDate, ts:Date.now(), entries:toSave};
      if(selectedMood) ne.mood = selectedMood;
      all.push(ne);
    }
    all.sort((a,b)=>b.date.localeCompare(a.date));
    S('kiroku_entries', all);

    // liveResults を更新（saveToday との二重保存を防ぐため liveResults には追加しない）
    S('live_'+todayKey, {entries:[], photos:[]});
    liveResults = {entries:[], photos:[]};

    // UI リセット
    attachedPhotos = {meal:[], skin:[], receipt:[]};
    ['meal','skin','receipt'].forEach(t=>renderPhotoRow(t));
    const fb = document.getElementById('ai-feedback');
    if(fb){ fb.style.display='none'; fb.innerHTML=''; }
    const ta = document.getElementById('ta'); if(ta) ta.value='';
    refreshLive();
    showToast(`${targetDate} に保存しました ✓`);
  } finally {
    // 必ずフラグを解除
    setTimeout(()=>{ _isSaving = false; }, 300);
  }
}

function discardFeedback(){
  pendingEntries=[];
  pendingAiComment='';
  const fb=document.getElementById('ai-feedback');
  if(fb){ fb.style.display='none'; fb.innerHTML=''; }
  showToast('破棄しました');
}

// 写真解析（独立関数）
async function analyzeImageWithAI(type, b64){
  const [mtype,imgData]=b64.split(';base64,');
  const mediaType=mtype.replace('data:','');
  const prompts={
    meal:'この食事の写真から栄養バランス（カロリー目安・タンパク質・炭水化物・脂質・野菜量）を推定し、日本語150字以内でアドバイスを。',
    skin:'この肌の写真を見て、肌状態（乾燥・脂っぽさ・血色・赤み・くすみ・ニキビ）を日本語150字以内で端的に分析してください。',
    receipt:'このレシートから{"store":"店名","total":数値,"category":"食費/日用品/交通費/娯楽/その他"}のJSONのみ返してください（前置き不要）。'
  };
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:imgData}},{type:'text',text:prompts[type]}]}]})});
    const d=await res.json();
    return d.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim()||null;
  }catch(e){ return null; }
}

function renderHistory(c){

        <span class="day-date">${day.date}</span>

          const tagBadges = cats.map(c=>`<span class="cat-pill ${CAT_CLS[c]||'cp-other'}">${CAT_LBL[c]||c}</span>`).join('');
          const rawText   = (e.details?.raw || e.summary || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const aiComment = (e.details?.ai_comment || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const entryId   = `he-${di}-${ei}`;
          return `<div class="de" id="${entryId}" style="flex-direction:column;align-items:stretch;gap:0">
            <!-- ヘッダー行: タグ＋アクションボタン -->

function deleteDay(date){
  if(!confirm(`${date} の記録をすべて削除しますか？`)) return;
  const all = getAll().filter(e=>e.date!==date);
  S('kiroku_entries', all);
  renderHistory(document.getElementById('content'));
  showToast('削除しました ✓');
}

function editEntry(date, ei){
  const all = getAll();
  const day = all.find(e=>e.date===date);
  if(!day) return;
  const entry = day.entries[ei];
  // 生テキストを編集対象にする（summary は識別子なので変更しない）
  const current = entry.details?.raw || entry.summary || '';
  const newRaw = prompt('内容を編集してください：', current);
  if(newRaw === null) return;
  const trimmed = newRaw.trim() || current;
  if(entry.details) entry.details.raw = trimmed;
  // カテゴリも再判定
  const newCats = autoCategories(trimmed);
  entry.categories = newCats;
  entry.category   = newCats[0];
  // AI コメント更新
  if(entry.details) entry.details.ai_comment = generateAIResponse(trimmed);
  S('kiroku_entries', all);
  renderHistory(document.getElementById('content'));
  showToast('編集しました ✓');
}

function deleteEntry(date, ei){
  if(!confirm('この項目を削除しますか？')) return;
  const all = getAll();
  const day = all.find(e=>e.date===date);
  if(!day) return;
  day.entries.splice(ei,1);
  // Remove day if empty
  const filtered = day.entries.length > 0 ? all : all.filter(e=>e.date!==date);
  S('kiroku_entries', filtered);
  renderHistory(document.getElementById('content'));
  showToast('削除しました ✓');
}

async function reanalyzeEntry(date, ei){
  const all = getAll();
  const day = all.find(e=>e.date===date);
  if(!day) return;
  const entry = day.entries[ei];
  const rawText = entry?.details?.raw || entry?.summary;
  if(!rawText){ showToast('元のテキストがありません'); return; }

  showToast('再解析中…');
  const prompt = `以下は生活記録のテキストです。\nテキスト:「${rawText}」\n含まれるすべての記録を抽出し以下のJSON形式のみで返してください（前置き不要）:\n{"entries":[{"category":"sleep/meal/skin/body/finance/other","summary":"50字以内サマリー","details":{"duration_h":数値,"quality":1-5,"medication":bool,"mouthpiece":bool,"meal_type":"朝/昼/夕/間食","calories_est":数値,"exercise_type":"","duration_min":数値,"transaction_type":"expense/income","amount":数値,"label":"","activity":"","raw":"${rawText}"}}]}\n複数の記録は別々のentryで。`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content:prompt}] })
    });
    const d = await res.json();
    const raw = d.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    const newEntries = (parsed.entries||[]).map(e=>({...e, ts:Date.now()}));
    // Replace old entry with new ones
    day.entries.splice(ei, 1, ...newEntries);
    S('kiroku_entries', all);
    renderHistory(document.getElementById('content'));
    showToast(`${newEntries.length}件に分割しました ✓`);
  }catch(e){
    showToast('再解析に失敗しました');
  }
}

// 🎯 条件別睡眠比較（得点圏打率的）
// ════════════════════════
function buildSleepConditionTable(){
  const all = getAll();
  const sleepDays = all.filter(d=>d.entries?.some(e=>e.category==='sleep'&&e.details?.duration_h));
  if(sleepDays.length < 5) return '';

  // Build condition groups: med x mp (4 combos)
  const groups = {
    '眠剤あり＋MP あり': [],
    '眠剤あり＋MP なし': [],
    '眠剤なし＋MP あり': [],
    '眠剤なし＋MP なし': [],
  };

  sleepDays.forEach((day, di) => {
    const se = day.entries.find(e=>e.category==='sleep'&&e.details?.duration_h);
    const med = !!se.details?.medication;
    const mp  = !!se.details?.mouthpiece;
    const key = `眠剤${med?'あり':'なし'}＋MP ${mp?'あり':'なし'}`;
    // Next day mood
    const nextDay = all.find(d=>d.date === fmtOffset(day.date, 1));
    const mood = nextDay?.mood || null;
    groups[key].push({ h: se.details.duration_h, mood });
  });

  const rows = Object.entries(groups).map(([label, arr]) => {
    if(!arr.length) return '';
    const avgH = (arr.reduce((s,x)=>s+x.h,0)/arr.length).toFixed(1);
    const moodArr = arr.filter(x=>x.mood);
    const avgMood = moodArr.length ? (moodArr.reduce((s,x)=>s+x.mood,0)/moodArr.length).toFixed(1) : '—';
    const moodEmoji = moodArr.length ? ['','😞','😕','😐','🙂','😄'][Math.round(parseFloat(avgMood))]||'' : '';
    const n = arr.length;
    return `<tr>
      <td style="padding:8px 10px;font-size:11px;color:var(--chalk2)">${label}</td>
      <td style="padding:8px 10px;text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#a0c0e8">${avgH}h</td>
      <td style="padding:8px 10px;text-align:center;font-size:12px">${moodEmoji} ${avgMood}</td>
      <td style="padding:8px 10px;text-align:center;font-size:10px;color:var(--chalk3)">${n}日</td>
    </tr>`;
  }).join('');

  if(!rows.trim()) return '';
  return `<div class="chart-card" style="margin-bottom:10px">
    <div class="chart-head">🎯 条件別睡眠比較</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="padding:6px 10px;text-align:left;font-size:9px;color:var(--chalk3);font-weight:500">条件</th>
        <th style="padding:6px 10px;text-align:center;font-size:9px;color:var(--chalk3);font-weight:500">平均睡眠</th>
        <th style="padding:6px 10px;text-align:center;font-size:9px;color:var(--chalk3);font-weight:500">翌日気分</th>
        <th style="padding:6px 10px;text-align:center;font-size:9px;color:var(--chalk3);font-weight:500">日数</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function fmtOffset(dateStr, days){
  const d = new Date(dateStr.replace(/\./g,'-'));
  d.setDate(d.getDate()+days);
  return fmt(d);
}

// ════════════════════════
// 💤 睡眠詳細スコア（NPBプラス的）
// ════════════════════════
function buildSleepScore(){
  const all = getAll();
  const sleepEntries = all.slice(0, Math.min(all.length,30))
    .flatMap(d=>d.entries||[]).filter(e=>e.category==='sleep'&&e.details?.duration_h);
  if(sleepEntries.length < 5) return '';

  const scores = sleepEntries.map(e => {
    const d = e.details;
    let score = 0;
    // Duration score (0-40): ideal=7.5h
    const diff = Math.abs((d.duration_h||0) - IDEAL_SLEEP);
    score += Math.max(0, 40 - diff*10);
    // Quality score (0-30)
    if(d.quality) score += (d.quality/5)*30;
    // No medication bonus (0-15)
    if(!d.medication) score += 15;
    // Mouthpiece bonus (0-15)
    if(d.mouthpiece) score += 15;
    return Math.min(100, Math.round(score));
  });

  const avg = Math.round(scores.reduce((s,x)=>s+x,0)/scores.length);
  const latest = scores[0];
  const trend = scores.length>=3 ? scores[0] - scores.slice(-3).reduce((s,x)=>s+x,0)/3 : 0;
  const trendLabel = trend > 5 ? '↑ 改善傾向' : trend < -5 ? '↓ 要注意' : '→ 安定';
  const trendColor = trend > 5 ? 'var(--green-s)' : trend < -5 ? 'var(--red-s)' : 'var(--chalk3)';
  const scoreColor = avg>=70?'var(--green-s)':avg>=50?'var(--accent2)':'var(--red-s)';

  return `<div class="chart-card" style="margin-bottom:10px">
    <div class="chart-head">💤 睡眠スコア（直近30日）</div>
    <div style="display:flex;align-items:center;gap:20px;padding:8px 0">
      <div style="text-align:center">
        <div style="font-family:var(--mono);font-size:36px;font-weight:700;color:${scoreColor}">${avg}</div>
        <div style="font-size:9px;color:var(--chalk3)">平均スコア / 100</div>
      </div>
      <div style="flex:1">
        <div style="height:10px;background:var(--bg2);border-radius:5px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;width:${avg}%;background:${scoreColor};border-radius:5px"></div>
        </div>
        <div style="font-size:11px;color:var(--chalk2)">直近: <span style="font-family:var(--mono);font-weight:700">${latest}</span></div>
        <div style="font-size:10px;color:${trendColor};margin-top:2px">${trendLabel}</div>
      </div>
    </div>
    <div style="font-size:9px;color:var(--chalk4);padding-top:6px;border-top:1px solid var(--border)">
      算出：睡眠時間40点 + 質30点 + 眠剤なし15点 + MP使用15点
    </div>
  </div>`;
}

// ════════════════════════
// 📅 曜日別パターン分析
// ════════════════════════
function buildWeekdayRadar(){
  const all = getAll();
  if(all.length < 14) return '';

  const DOW = ['日','月','火','水','木','金','土'];
  const byDow = Array.from({length:7}, ()=>({sleep:[],meals:0,days:0}));

  all.forEach(day => {
    const d = new Date(day.date.replace(/\./g,'-'));
    const dow = d.getDay();
    byDow[dow].days++;
    const se = day.entries?.find(e=>e.category==='sleep'&&e.details?.duration_h);
    if(se) byDow[dow].sleep.push(se.details.duration_h);
    byDow[dow].meals += day.entries?.filter(e=>e.category==='meal').length||0;
  });

  const avgSleep = byDow.map(x=>x.sleep.length?+(x.sleep.reduce((s,v)=>s+v,0)/x.sleep.length).toFixed(1):0);
  const avgMeals = byDow.map(x=>x.days?+(x.meals/x.days).toFixed(1):0);

  const maxS = Math.max(...avgSleep, 8);

  const bars = DOW.map((d,i) => {
    const h = avgSleep[i];
    const pct = maxS>0?(h/maxS)*100:0;
    const color = h>=IDEAL_SLEEP?'var(--green-s)':h>=6?'var(--accent2)':'var(--red-s)';
    return `<div style="flex:1;text-align:center">
      <div style="font-size:9px;color:var(--chalk3);margin-bottom:4px">${avgMeals[i]}食</div>
      <div style="height:60px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:4px">
        <div style="width:20px;background:${color};border-radius:3px 3px 0 0;height:${Math.max(pct,4)}%"></div>
      </div>
      <div style="font-size:10px;font-family:var(--mono);font-weight:700;color:${color}">${h||'—'}</div>
      <div style="font-size:10px;color:var(--chalk3)">${d}</div>
    </div>`;
  }).join('');

  return `<div class="chart-card" style="margin-bottom:10px">
    <div class="chart-head">📅 曜日別パターン（睡眠h・食事回数）</div>
    <div style="display:flex;gap:2px;padding:8px 0;align-items:flex-end">${bars}</div>
    <div style="font-size:9px;color:var(--chalk4);text-align:center">棒グラフ=平均睡眠時間　上の数字=平均食事回数</div>
  </div>`;
}

function buildMonthlyCards(){
  const all = getAll();
  if(!all.length) return '';

  // Group entries by YYYY.MM
  const months = {};
  all.forEach(day => {
    const ym = day.date.slice(0,7); // "2025.02"
    if(!months[ym]) months[ym] = [];
    months[ym].push(day);
  });

  const ymKeys = Object.keys(months).sort().reverse();
  if(!ymKeys.length) return '';

  const cards = ymKeys.map(ym => {
    const days = months[ym];
    const recordedDays = days.length;

    // Sleep stats
    const sleepEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='sleep'&&e.details?.duration_h);
    const avgSleep = sleepEntries.length ? (sleepEntries.reduce((s,e)=>s+e.details.duration_h,0)/sleepEntries.length).toFixed(1) : null;
    const medDays = sleepEntries.filter(e=>e.details?.medication).length;

    // 睡眠時間の最大・最小（ばらつき）
    const sleepDurs = sleepEntries.map(e=>e.details.duration_h);
    const minSleep = sleepDurs.length ? Math.min(...sleepDurs).toFixed(1) : null;
    const maxSleep = sleepDurs.length ? Math.max(...sleepDurs).toFixed(1) : null;

    // 入眠時刻のばらつき（標準偏差・分単位）
    const bedTimes = sleepEntries.filter(e=>e.details?.bed_time).map(e=>{
      const [h,m] = e.details.bed_time.split(':').map(Number);
      return h >= 18 ? h + m/60 : h + 24 + m/60;
    });
    const bedAvg = bedTimes.length ? bedTimes.reduce((s,v)=>s+v,0)/bedTimes.length : null;
    const bedSD  = bedTimes.length >= 3
      ? Math.round(Math.sqrt(bedTimes.reduce((s,v)=>s+(v-bedAvg)**2,0)/bedTimes.length)*60)
      : null;
    const bedAvgStr = bedAvg !== null ? (()=>{
      const h=Math.floor(bedAvg%24), m=Math.round((bedAvg%1)*60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    })() : null;

    // 食事バランス（タンパク質推定合計）
    const mealEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='meal');
    const totalProtein = mealEntries.reduce((s,e)=>{
      if(e.details?.protein_g) return s+e.details.protein_g;
      return s + estimateNutrition(e.details?.raw||e.summary||'').p;
    }, 0);
    const mealDaysCount = days.filter(d=>d.entries?.some(e=>e.category==='meal')).length;

    // Exercise stats
    const exCount = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='body').length;

    // Mood avg
    const moodDays = days.filter(d=>d.mood);
    const avgMood = moodDays.length ? (moodDays.reduce((s,d)=>s+d.mood,0)/moodDays.length).toFixed(1) : null;
    const moodEmoji = avgMood ? ['','😞','😕','😐','🙂','😄'][Math.round(avgMood)] : '';

    // Finance
    const finEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='finance');
    const totalExp = finEntries.filter(e=>e.details?.transaction_type==='expense').reduce((s,e)=>s+(e.details?.amount||0),0);
    const totalInc = finEntries.filter(e=>e.details?.transaction_type==='income').reduce((s,e)=>s+(e.details?.amount||0),0);

    // Sleep debt for this month
    const sleepDebt = sleepEntries.length ? Math.round((sleepEntries.reduce((s,e)=>s+(IDEAL_SLEEP-e.details.duration_h),0))*10)/10 : null;

    // Get calendar month name
    const [y,m] = ym.split('.');
    const monthName = `${y}年${parseInt(m)}月`;

    // Stat items（食事回数を削除→食事バランス・睡眠ばらつきを追加）

// ── 週次集計サマリーカード（7日間の平均睡眠・タンパク質合計など）
function buildWeeklySummary(){
  const all = getAll();
  if(!all.length) return '';

  // 直近7日のデータを日付キーで絞り込む
  const d7ago = new Date(TODAY); d7ago.setDate(d7ago.getDate()-6);
  const key7  = fmt(d7ago);
  const week7 = all.filter(d => d.date >= key7 && d.date <= todayKey);

  // 先週（7〜14日前）
  const d14ago = new Date(TODAY); d14ago.setDate(d14ago.getDate()-13);
  const key14  = fmt(d14ago);
  const week14 = all.filter(d => d.date >= key14 && d.date < key7);

  function calcWeek(days){
    const sleepEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='sleep'&&e.details?.duration_h);
    const mealEntries  = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='meal');
    const bodyEntries  = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='body');
    const finEntries   = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='finance'&&e.details?.transaction_type==='expense');

    // 平均睡眠（h）
    const avgSleep = sleepEntries.length
      ? Math.round(sleepEntries.reduce((s,e)=>s+e.details.duration_h,0)/sleepEntries.length*10)/10 : null;
    // 睡眠合計（h）
    const totalSleep = sleepEntries.length
      ? Math.round(sleepEntries.reduce((s,e)=>s+e.details.duration_h,0)*10)/10 : null;
    // タンパク質合計（g）- details.protein_g または estimateNutrition から
    const totalProtein = mealEntries.reduce((s,e)=>{
      if(e.details?.protein_g) return s + e.details.protein_g;
      const nutr = estimateNutrition(e.details?.raw||e.summary||'');
      return s + nutr.p;
    }, 0);
    // 運動回数・合計時間
    const exCount = bodyEntries.length;
    const exMin   = bodyEntries.reduce((s,e)=>s+(e.details?.duration_min||0),0);
    // 支出合計
    const totalExp = finEntries.reduce((s,e)=>s+(e.details?.amount||0),0);

    return { avgSleep, totalSleep, totalProtein: Math.round(totalProtein), exCount, exMin, totalExp, recordDays: days.length };
  }

  const cur  = calcWeek(week7);
  const prev = calcWeek(week14);

  // 前週比表示ヘルパー
  const diff = (cv, pv, unit, invert=false) => {
    if(cv===null||pv===null||pv===0) return '';
    const d = Math.round((cv-pv)*10)/10;
    const good = invert ? d<0 : d>0;
    const c = good ? 'var(--green-s)' : d===0 ? 'var(--chalk3)' : 'var(--red-s)';
    return `<span style="font-size:10px;color:${c};margin-left:5px">${d>0?'+':''}${d}${unit}</span>`;
  };

  const statRow = (icon, label, val, valStr, prevVal, unit, invert=false) =>
    val===null ? '' : `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;color:var(--chalk2)">${icon} ${label}</span>
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent3)">${valStr}${diff(val,prevVal,unit,invert)}</span>
    </div>`;

  const rows = [
    statRow('💤','平均睡眠時間', cur.avgSleep,   `${cur.avgSleep}h`,    prev.avgSleep,   'h'),
    statRow('💤','睡眠合計',     cur.totalSleep, `${cur.totalSleep}h`,  prev.totalSleep, 'h'),
    cur.totalProtein>0 ? statRow('💪','タンパク質合計', cur.totalProtein, `${cur.totalProtein}g`, prev.totalProtein, 'g') : '',
    cur.exCount>0 ? statRow('🏃','運動回数',     cur.exCount, `${cur.exCount}回${cur.exMin?` / ${cur.exMin}分`:''}`, prev.exCount, '回') : '',
    cur.totalExp>0 ? statRow('💴','支出合計', cur.totalExp, `¥${cur.totalExp.toLocaleString()}`, prev.totalExp, '円', true) : '',
  ].filter(Boolean).join('');

  if(!rows) return '';

  const [y,m,d] = todayKey.split('.');
  const fromStr = `${key7.slice(5).replace('.',  '/')} 〜 ${todayKey.slice(5).replace('.','/')}`;

  return `<div class="chart-card" style="margin-bottom:14px">
    <div class="chart-head" style="display:flex;justify-content:space-between;align-items:center">
      <span>📊 直近1週間の集計</span>
      <span style="font-size:9px;color:var(--chalk4);font-family:var(--mono)">${fromStr}（${cur.recordDays}日分）</span>
    </div>
    <div style="padding:0 4px">${rows}</div>
    ${prev.recordDays>0?`<div style="padding:8px 4px 2px;font-size:9px;color:var(--chalk4)">カッコ内は前週比</div>`:''}
  </div>`;
}

// GRAPHS (SVG-based)
// ════════════════════════
function toMinutes(timeStr){
  // Parse "3:30", "23:45", "0:00" etc. Returns minutes from midnight
  if(!timeStr) return null;
  const m = String(timeStr).match(/(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return parseInt(m[1])*60 + parseInt(m[2]);
}

function sleepStartMinutes(details){
  // bedtime stored as bed_time "23:30" or derive from duration+wake
  if(details?.bed_time) return toMinutes(details.bed_time);
  if(details?.sleep_start) return toMinutes(details.sleep_start);
  // fallback: estimate from wake - duration
  if(details?.duration_h && details?.wake_time){
    const wake = toMinutes(details.wake_time);
    if(wake !== null) return ((wake - details.duration_h*60) + 1440) % 1440;
  }
  return null;
}

function wakeMinutes(details){
  if(details?.wake_time) return toMinutes(details.wake_time);
  return null;
}

function makeSVGLine(days, valuesFn, color, label, unit, minY, maxY, yFmt){
  const W = 320, H = 100, PAD = {t:8,r:8,b:28,l:36};
  const iW = W - PAD.l - PAD.r;
  const iH = H - PAD.t - PAD.b;
  const vals = days.map(valuesFn);
  const valid = vals.filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  if(!valid.length) return `<div style="padding:12px;font-size:11px;color:var(--chalk4);text-align:center">データなし</div>`;
  const lo = Math.min(...valid), hi = Math.max(...valid);
  const range = hi - lo || 1;
  const scaleY = v => v===null ? null : PAD.t + iH - ((v-lo)/range)*iH;
  const scaleX = i => PAD.l + (i/(days.length-1||1))*iW;

  // Build path
  let path = ''; let dotHtml = '';
  vals.forEach((v,i)=>{
    if(v===null) return;
    const x = scaleX(i), y = scaleY(v);
    path += path ? ` L${x},${y}` : `M${x},${y}`;
    dotHtml += `<circle cx="${x}" cy="${y}" r="3" fill="${color}" opacity=".9"/>`;
  });

  // X axis labels (show every ~5 days)
  const step = Math.max(1, Math.floor(days.length/6));
  let xLabels = '';
  days.forEach((d,i)=>{
    if(i%step===0||i===days.length-1){
      xLabels += `<text x="${scaleX(i)}" y="${H-4}" text-anchor="middle" fill="#6e8872" font-size="8">${d.date.slice(5)}</text>`;
    }
  });

  // Y axis labels
  const yVals = [lo, (lo+hi)/2, hi];
  let yLabels = '';
  yVals.forEach(v=>{
    const y = scaleY(v);
    yLabels += `<text x="${PAD.l-4}" y="${y+3}" text-anchor="end" fill="#6e8872" font-size="8">${yFmt?yFmt(v):Math.round(v*10)/10}${unit}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <line x1="${PAD.l}" y1="${PAD.t}" x2="${PAD.l}" y2="${PAD.t+iH}" stroke="#3d4d42" stroke-width="1"/>
    <line x1="${PAD.l}" y1="${PAD.t+iH}" x2="${PAD.l+iW}" y2="${PAD.t+iH}" stroke="#3d4d42" stroke-width="1"/>
    ${yLabels}${xLabels}
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" opacity=".85"/>
    ${dotHtml}
  </svg>`;
}

function timeLabel(mins){
  if(mins===null||isNaN(mins)) return '';
  const h = Math.floor(((mins%1440)+1440)%1440/60);
  const m = Math.floor(mins%60);
  return `${h}:${String(m).padStart(2,'0')}`;
}

function buildCharts(days){
  // Data extraction
  const getSleep = d => d.entries?.find(e=>e.category==='sleep'&&e.details?.duration_h);

  const durVals   = d => { const s=getSleep(d); return s?s.details.duration_h:null; };
  const bedVals   = d => { const s=getSleep(d); return s?sleepStartMinutes(s.details):null; };
  const wakeVals  = d => { const s=getSleep(d); if(!s) return null; return wakeMinutes(s.details)||
    (sleepStartMinutes(s.details)!==null ? (sleepStartMinutes(s.details)+s.details.duration_h*60)%1440 : null); };
  const mealVals  = d => d.entries?.filter(e=>e.category==='meal').length||0;
  const finVals   = d => Math.abs((d.entries||[]).filter(e=>e.category==='finance').reduce((s,e)=>s-(e.details?.amount||0),0));

  const hasBed  = days.some(d=>bedVals(d)!==null);
  const hasWake = days.some(d=>wakeVals(d)!==null);
  const hasFin  = days.some(d=>finVals(d)>0);

  const gc = (title, svg) => `
    <div style="margin-bottom:6px">
      <div style="font-size:10px;color:var(--chalk3);letter-spacing:.1em;margin-bottom:6px">${title}</div>
      ${svg}
    </div>`;

  return `<div class="chart-card">
    <div class="chart-head">📊 推移グラフ</div>
    <div class="chart-body">
      ${gc('😴 睡眠時間（h）', makeSVGLine(days,durVals,'#7090b8','睡眠時間','h',0,12,null))}
      ${hasBed  ? gc('🌙 入眠時刻', makeSVGLine(days,bedVals,'#9080c8','入眠','',0,1440,timeLabel)) : ''}
      ${hasWake ? gc('☀️ 起床時刻', makeSVGLine(days,wakeVals,'#d4a040','起床','',0,1440,timeLabel)) : ''}
      ${gc('🍱 食事記録回数', makeSVGLine(days,mealVals,'#70a880','食事回数','回',0,5,null))}
      ${hasFin  ? gc('💴 支出（円）', makeSVGLine(days,finVals,'#c8a040','支出','',0,null,v=>`¥${Math.round(v).toLocaleString()}`)) : ''}
    </div>
  </div>`;
}
