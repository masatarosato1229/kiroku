async function checkAutoReport(){
  const last = L('auto_report_check', '');
  if(last === todayKey) return; // already checked today
  S('auto_report_check', todayKey);

  const now = new Date(TODAY);
  const dow = now.getDay(); // 0=Sun
  const dom = now.getDate();
  const mon = now.getMonth()+1;

  const needsWeekly  = dow === 0; // every Sunday
  const needsMonthly = dom === 1; // 1st of month
  const needsYearly  = dom === 1 && mon === 1; // Jan 1

  const reports = L('saved_reports',[]);

  const alreadyDone = (type) => reports.some(r=>r.auto===type&&r.date===todayKey);

  if(needsWeekly && !alreadyDone('weekly')){
    showToast('週次レポートを自動生成中…');
    await runAutoReport('weekly', 7, '週次');
  }
  if(needsMonthly && !alreadyDone('monthly')){
    showToast('月次レポートを自動生成中…');
    await runAutoReport('monthly', 30, '月次');
  }
  if(needsYearly && !alreadyDone('yearly')){
    showToast('年次レポートを自動生成中…');
    await runAutoReport('yearly', 365, '年次');
  }
}

async function runAutoReport(type, days, label){
  const all = getAll();
  const slice = all.slice(0, days);
  if(slice.length < 3) return; // not enough data

  const summary = buildReportSummary(slice);
  const prompt = buildReportPrompt(label, summary);

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content:prompt}] })
    });
    const d = await res.json();
    const text = d.content?.map(c=>c.text||'').join('') || '分析できませんでした';
    const reports = L('saved_reports',[]);
    reports.push({ period:label, date:todayKey, text, auto:type, preview:text.slice(0,60).replace(/\n/g,' ')+'…' });
    S('saved_reports', reports);
    showToast(`${label}レポートを保存しました ✓`);
    if(currentNav==='report') renderReport(document.getElementById('content'));
  }catch(e){ console.error('auto report failed',e); }
}

function buildReportSummary(slice){
  return slice.map(day => {
    const lines = [];
    if(day.mood) lines.push(`気分:${['','最低','悪い','普通','良い','最高'][day.mood]}`);
    (day.entries||[]).forEach(e => {
      if(e.category==='sleep') lines.push(`睡眠:${e.details?.duration_h||'?'}h${e.details?.medication?' 眠剤':''}${e.details?.mouthpiece?' MP':''}`);
      else if(e.category==='meal') lines.push(`食事(${e.details?.meal_type||''}):${e.summary}`);
      else if(e.category==='skin') lines.push(`肌:${(e.details?.ai_result||e.summary).slice(0,60)}`);
      else if(e.category==='body') lines.push(`運動:${e.summary}`);
      else if(e.category==='finance') lines.push(`収支:${e.details?.transaction_type==='income'?'収入':'支出'}¥${e.details?.amount||0}`);
      else lines.push(`メモ:${(e.details?.raw||e.summary).slice(0,80)}`);
    });
    return `[${day.date}] ${lines.join(' / ')||'記録なし'}`;
  }).join('\n');
}

function buildReportPrompt(label, summary){
  return `以下は${label}分の生活記録です。\n\n${summary}\n\n各項目を日本語で分析してください（各100〜150字）：\n\n**😴 睡眠**\n眠剤使用との関係、時間パターン、傾向。\n\n**🍱 食事・栄養**\n食事回数・バランスの安定性。未分類メモにも食事情報があれば読み取って分析してください。\n\n**✨ 肌**\n状態の変化・特徴（記録があれば）。\n\n**🏃 活動・趣味**\nギター・勉強・運動などの継続状況と励まし。\n\n**💴 収支**\n支出傾向と簡単なコメント（記録があれば）。\n\n**😊 気分の傾向**\n気分スコアのパターンや睡眠との関係（記録があれば）。\n\n**⭐ 総評とアドバイス**\nこの期間の一番よかった点（具体的に）と、次の期間への実行可能なアドバイスを1つ。\n\n温かく、具体的に、ポジティブに。`;
}

async function runReport(){
  const all = getAll();
  const slice = all.slice(0, analysisPeriod===99999?all.length:analysisPeriod);
  if(!slice.length){ showToast('記録がありません'); return; }
  document.getElementById('ai-spin')?.classList.add('show');
  document.getElementById('ai-out').innerHTML = '';

  const pl = PERIODS.find(p=>p.d===analysisPeriod)?.l || `${analysisPeriod}日`;
  const summary = buildReportSummary(slice);
  const prompt = buildReportPrompt(pl, summary);

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, messages:[{role:'user',content:prompt}] })
    });
    const d = await res.json();
    const text = d.content?.map(c=>c.text||'').join('') || '分析できませんでした';
    document.getElementById('ai-spin')?.classList.remove('show');
    document.getElementById('ai-out').innerHTML = `<div class="ai-box"><h3>${pl} レポート</h3><p>${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--accent3)">$1</strong>')}</p></div>`;
    const reports = L('saved_reports',[]);
    reports.push({ period:pl, date:todayKey, text, preview:text.slice(0,60).replace(/\n/g,' ')+'…' });
    S('saved_reports', reports);
    showToast('レポートを保存しました ✓');
  }catch(e){
    document.getElementById('ai-spin')?.classList.remove('show');
    showToast('レポート作成に失敗しました');
  }
}

function showFixPanel(){ document.getElementById('fix-panel').style.display='block'; }
function hideFixPanel(){ document.getElementById('fix-panel').style.display='none'; }

function fixMedMP(){
  const log = document.getElementById('fix-log1');
  log.style.display='block'; log.innerHTML='';
  const all = getAll();
  if(!all.length){ log.innerHTML='<span style="color:#c87060">データがありません</span>'; return; }
  let count=0;
  all.forEach(day=>{
    (day.entries||[]).forEach(e=>{
      if(e.category==='sleep'||(e.categories||[]).includes('sleep')){
        if(!e.details) e.details={};
        const changed = !e.details.medication||!e.details.mouthpiece;
        e.details.medication=true; e.details.mouthpiece=true;
        if(changed){ log.innerHTML+=`<span style="color:#70a880">✓ ${day.date} 眠剤+MPをセット</span>\n`; count++; }
        else { log.innerHTML+=`<span style="color:#3e5442">- ${day.date} 既にセット済み</span>\n`; }
      }
    });
  });
  S('kiroku_entries',all);
  log.innerHTML+=`\n<span style="color:#f0d0a8;font-weight:700">✅ 完了 ${count}件を更新しました</span>`;
  log.scrollTop=log.scrollHeight;
}

function fixSleepDuration(){
  const log = document.getElementById('fix-log2');
  log.style.display='block'; log.innerHTML='';
  const all = getAll();
  if(!all.length){ log.innerHTML='<span style="color:#c87060">データがありません</span>'; return; }
  let count=0, skip=0;
  all.forEach(day=>{
    (day.entries||[]).forEach(e=>{
      if(e.category==='sleep'||(e.categories||[]).includes('sleep')){
        const raw=e.details?.raw||e.summary||'';
        if(!raw){ log.innerHTML+=`<span style="color:#f0d0a8">△ ${day.date} テキストなし</span>\n`; skip++; return; }
        const result=calculateSleepDuration(raw);
        if(result){
          if(!e.details) e.details={};
          const old=e.details.duration_h;
          e.details.duration_h=result.duration_h;
          e.details.bed_time=result.bed_time;
          e.details.wake_time=result.wake_time;
          log.innerHTML+=`<span style="color:#70a880">✓ ${day.date} ${old?old+'h→':''}${result.duration_h}h（${result.bed_time}〜${result.wake_time}）</span>\n`;
          count++;
        } else {
          log.innerHTML+=`<span style="color:#f0d0a8">△ ${day.date} 時刻抽出不可:「${raw.slice(0,30)}」</span>\n`;
          skip++;
        }
      }
    });
  });
  S('kiroku_entries',all);
  log.innerHTML+=`\n<span style="color:#f0d0a8;font-weight:700">✅ 完了 計算済:${count}件 / 抽出不可:${skip}件</span>`;
  log.scrollTop=log.scrollHeight;
}

function fixAll(){
  const log = document.getElementById('fix-log3');
  log.style.display='block'; log.innerHTML='';
  const all = getAll();
  if(!all.length){ log.innerHTML='<span style="color:#c87060">データがありません</span>'; return; }
  let c1=0,c2=0,skip=0;
  all.forEach(day=>{
    (day.entries||[]).forEach(e=>{
      if(e.category==='sleep'||(e.categories||[]).includes('sleep')){
        if(!e.details) e.details={};
        // 眠剤・MP
        const changed=!e.details.medication||!e.details.mouthpiece;
        e.details.medication=true; e.details.mouthpiece=true;
        if(changed) c1++;
        // 睡眠時間
        const raw=e.details?.raw||e.summary||'';
        const result=raw?calculateSleepDuration(raw):null;
        if(result){
          e.details.duration_h=result.duration_h;
          e.details.bed_time=result.bed_time;
          e.details.wake_time=result.wake_time;
          log.innerHTML+=`<span style="color:#70a880">✓ ${day.date} ${result.duration_h}h（${result.bed_time}〜${result.wake_time}）眠剤+MP✓</span>\n`;
          c2++;
        } else {
          log.innerHTML+=`<span style="color:#f0d0a8">△ ${day.date} 眠剤+MP✓ / 時刻抽出不可</span>\n`;
          skip++;
        }
      }
    });
  });
  S('kiroku_entries',all);
  log.innerHTML+=`\n<span style="color:#f0d0a8;font-weight:700">✅ 全処理完了｜眠剤+MP:${c1}件 睡眠時間再計算:${c2}件 抽出不可:${skip}件</span>`;
  log.scrollTop=log.scrollHeight;
  // 履歴タブを更新
  if(currentNav==='history') render();
}


// ════════════════════════════════════════════════════
// Googleドライブ月次レポート出力
// ※ Google Drive APIの直接アップロードはCORSで不可のため、
//   テキストファイルをダウンロードしてGoogleドライブに手動保存する方式
// ════════════════════════════════════════════════════
function exportMonthToGoogleDrive(ym){
  const all = getAll();
  const [y,m] = ym.split('.');
  const monthName = `${y}年${parseInt(m)}月`;
  const days = all.filter(d=>d.date.startsWith(ym));

  if(!days.length){ showToast('この月のデータがありません'); return; }

  // 集計
  const sleepEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='sleep'&&e.details?.duration_h);
  const avgSleep = sleepEntries.length
    ? (sleepEntries.reduce((s,e)=>s+e.details.duration_h,0)/sleepEntries.length).toFixed(1) : '—';
  const minSleep = sleepEntries.length ? Math.min(...sleepEntries.map(e=>e.details.duration_h)).toFixed(1) : '—';
  const maxSleep = sleepEntries.length ? Math.max(...sleepEntries.map(e=>e.details.duration_h)).toFixed(1) : '—';
  const sleepDebt = sleepEntries.length
    ? Math.round(sleepEntries.reduce((s,e)=>s+(IDEAL_SLEEP-e.details.duration_h),0)*10)/10 : 0;

  const bedTimes = sleepEntries.filter(e=>e.details?.bed_time).map(e=>{
    const [h,mm]=e.details.bed_time.split(':').map(Number);
    return h>=18 ? h+mm/60 : h+24+mm/60;
  });
  const bedAvg = bedTimes.length ? bedTimes.reduce((s,v)=>s+v,0)/bedTimes.length : null;
  const bedSD  = bedTimes.length>=3
    ? Math.round(Math.sqrt(bedTimes.reduce((s,v)=>s+(v-bedAvg)**2,0)/bedTimes.length)*60) : null;
  const bedAvgStr = bedAvg !== null
    ? `${String(Math.floor(bedAvg%24)).padStart(2,'0')}:${String(Math.round((bedAvg%1)*60)).padStart(2,'0')}` : '—';

  const mealEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='meal');
  const totalProtein = Math.round(mealEntries.reduce((s,e)=>{
    if(e.details?.protein_g) return s+e.details.protein_g;
    return s+estimateNutrition(e.details?.raw||e.summary||'').p;
  },0));
  const totalFat = Math.round(mealEntries.reduce((s,e)=>s+estimateNutrition(e.details?.raw||e.summary||'').f,0));
  const totalCarbs = Math.round(mealEntries.reduce((s,e)=>s+estimateNutrition(e.details?.raw||e.summary||'').c,0));

  const exCount = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='body').length;
  const finEntries = days.flatMap(d=>d.entries||[]).filter(e=>e.category==='finance');
  const totalExp = finEntries.filter(e=>e.details?.transaction_type==='expense').reduce((s,e)=>s+(e.details?.amount||0),0);

  // レポートテキスト生成
  const lines = [
    `═══════════════════════════════════`,
    `  ${monthName} 月次生活記録レポート`,
    `  生成日時: ${new Date().toLocaleString('ja-JP')}`,
    `═══════════════════════════════════`,
    ``,
    `【睡眠】`,
    `  記録日数    : ${sleepEntries.length}日`,
    `  平均睡眠    : ${avgSleep}時間`,
    `  最短/最長   : ${minSleep}h 〜 ${maxSleep}h`,
    `  睡眠借金    : ${sleepDebt > 0 ? '-' : '+'}${Math.abs(sleepDebt)}時間（理想7.5h基準）`,
    `  平均入眠時刻: ${bedAvgStr}`,
    `  入眠ばらつき: ${bedSD !== null ? '±'+bedSD+'分' : '—'}`,
    sleepEntries.filter(e=>e.details?.medication).length > 0
      ? `  眠剤使用    : ${sleepEntries.filter(e=>e.details?.medication).length}日`
      : '',
    ``,
    `【食事・栄養（推定）】`,
    `  食事記録日数 : ${days.filter(d=>d.entries?.some(e=>e.category==='meal')).length}日`,
    `  タンパク質合計: ${totalProtein}g`,
    `  脂質合計     : ${totalFat}g`,
    `  糖質合計     : ${totalCarbs}g`,
    ``,
    `【運動】`,
    `  記録回数     : ${exCount}回`,
    ``,
    `【収支】`,
    `  支出合計     : ¥${totalExp.toLocaleString()}`,
    ``,
    `【日別サマリー】`,
    ...days.map(day=>{
      const se = day.entries?.find(e=>e.category==='sleep'&&e.details?.duration_h);
      const sleepStr = se ? `睡眠${se.details.duration_h}h${se.details.bed_time?` (${se.details.bed_time}〜${se.details.wake_time||'?'})`:''}`:'睡眠記録なし';
      const hasMeal = day.entries?.some(e=>e.category==='meal') ? '食事✓' : '';
      const hasEx   = day.entries?.some(e=>e.category==='body') ? '運動✓' : '';
      return `  ${day.date}  ${sleepStr}  ${hasMeal}  ${hasEx}`;
    }),
    ``,
    `─── 以上 ─────────────────────────`,
  ].filter(v=>v!==undefined);

  const text = lines.join('\n');
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `記録_${ym}_月次レポート.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${monthName}のレポートをダウンロードしました。Googleドライブに保存してください。`);
}

function doBackup(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); data[k]=localStorage.getItem(k); }
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`記録バックアップ_${todayKey}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました ✓');
}

function restoreBackup(input){
  const file = input.files[0]; if(!file) return;
  if(!confirm('バックアップから復元しますか？\n現在のデータと統合されます（上書きはしません）。')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      // Restore all keys
      Object.entries(data).forEach(([k,v]) => {
        if(!localStorage.getItem(k)) localStorage.setItem(k, v);
      });
      // Then run migration to consolidate into kiroku_entries
      migrateOldData();
      showToast('復元しました ✓ リロードします…');
      setTimeout(() => location.reload(), 1200);
    }catch(e){
      showToast('復元に失敗しました');
    }
  };
  reader.readAsText(file);
}
